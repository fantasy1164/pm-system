# 單機版單一 exe 的自動打包。
#
# PyInstaller 不能跨平台打包 —— Windows 的 exe 只能在 Windows 上產生。
# 開發機不是 Windows、或懶得跑 build.bat 時,讓 GitHub 的 Windows 主機代勞:
#
#   手動觸發:GitHub → Actions → Build standalone exe → Run workflow
#            → 完成後在該次 run 的 Artifacts 區下載 zip (內含 exe)
#
#   發佈版本:打 tag (例 standalone-v1.0) 推上去,會自動建立 GitHub Release
#            並把 exe 掛上去 —— 使用者從 Releases 頁面就能直接下載。
#
# 此 workflow 只在手動觸發或 standalone-v* tag 時執行,
# 平常 push / PR 完全不跑,不影響線上部署流程。
name: Build standalone exe

on:
  workflow_dispatch:
  push:
    tags:
      - "standalone-v*"

permissions:
  contents: write   # 建立 Release 需要;Artifacts 上傳不需要額外權限

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r standalone/requirements.txt pyinstaller

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean `
            --distpath standalone/dist `
            --workpath standalone/build/.work `
            standalone/build/pm.spec 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) { throw "pyinstaller failed" }

      - name: Verify Tcl/Tk is bundled for the startup animation
        shell: pwsh
        run: |
          # 啟動動畫是 Python 起來之後自己開 Tk 視窗畫的 (刻意不用 PyInstaller
          # 的 Splash —— 那個由 bootloader 在解壓縮途中載入 Tcl,相依還沒就位,
          # 在沒裝 VC 執行期的乾淨 Windows 上會直接讓 exe 死掉)。
          # 但這條路的前提是 tkinter 與 Tcl/Tk 真的有被打包:少了它們,動畫會
          # 靜默消失 —— 服務照跑,沒有人會發現,直到使用者說「點下去沒反應」。
          $toc = Get-Content standalone/build/.work/pm/Analysis-00.toc -Raw
          foreach ($m in @("_tkinter", "tcl86t.dll", "tk86t.dll")) {
            if ($toc -notmatch [regex]::Escape($m)) {
              throw "$m is missing from the bundle - the startup animation would silently vanish"
            }
          }
          Write-Host "Tcl/Tk bundled OK."

      - name: Smoke test (start, probe health, verify tray module, stop)
        shell: pwsh
        run: |
          $env:PM_NO_BROWSER = "1"
          $exe = Get-ChildItem standalone/dist/*.exe | Select-Object -First 1
          $p = Start-Process -FilePath $exe.FullName -PassThru
          $ok = $false
          foreach ($i in 1..60) {
            Start-Sleep -Seconds 1
            try {
              $r = Invoke-RestMethod -Uri http://127.0.0.1:5000/api/health -TimeoutSec 2
              if ($r.status -eq "ok") { $ok = $true; break }
            } catch {}
          }
          Stop-Process -Id $p.Id -Force
          if (-not $ok) { throw "exe started but /api/health never became ok" }

          # 使用者資料一律固定在 %LOCALAPPDATA%\專案管理系統:exe 旁邊必須
          # 一塵不染,否則「exe 可以隨便放」這個賣點就破功了。
          $beside = Get-ChildItem standalone/dist -Directory
          if ($beside) { throw "exe left folders beside itself: $($beside.Name -join ', ')" }
          $home_ = "$env:LOCALAPPDATA\專案管理系統"
          foreach ($d in @("data", "backups", "logs")) {
            if (-not (Test-Path "$home_\$d")) { throw "missing $home_\$d" }
          }
          if (-not (Test-Path "$home_\data\pm.sqlite")) { throw "no database at $home_" }

          # exe 是 console=False 打包的,沒有主控台可看 —— 訊息都在記錄檔裡。
          # 記錄檔在固定位置,不在 exe 旁邊 (使用者資料一律放 %LOCALAPPDATA%)。
          $log = "$env:LOCALAPPDATA\專案管理系統\logs\pm.log"
          if (-not (Test-Path $log)) { throw "no log file: windowed logging is broken" }
          Get-Content $log

          # 「系統匣模組載入失敗」= tray_win32 沒被打包進去,使用者會沒有圖示、
          # 沒有停止按鈕。這是靜默退化 —— 服務照跑,不擋冒煙測試,故明著抓。
          # (「系統匣建立失敗」則放行:CI runner 沒有桌面工作階段,建不出來是正常的。)
          if (Select-String -Path $log -Pattern "系統匣模組載入失敗" -Quiet) {
            throw "tray_win32 missing from exe - the tray icon would not work"
          }
          Write-Host "Smoke test passed."

      - name: Verify no copyleft is bundled
        shell: pwsh
        run: |
          # 這一步是本專案「散布物零 copyleft」這條線的守門員。
          # 失效是靜默的:某天有人加了個看似無害的相依 (或某個套件換了授權),
          # exe 照樣產得出來、照樣能跑,沒有人會發現 —— 直到有人來問。
          $toc = Get-Content standalone/build/Analysis-00.toc -Raw -ErrorAction SilentlyContinue
          if (-not $toc) { $toc = Get-Content standalone/build/.work/pm/Analysis-00.toc -Raw }
          # pystray/python-xlib = LGPL;certifi = MPL-2.0 (由 requests 帶入)
          foreach ($m in @("pystray", "Xlib", "certifi", "cryptography", "PIL")) {
            if ($toc -match "site-packages[\\/]$m[\\/.]") {
              throw "$m got bundled into the exe - it carries copyleft or was meant to be excluded"
            }
          }
          # 授權聲明:BSD/Apache/ZPL 都要求二進位散布時隨附著作權聲明
          foreach ($f in @("THIRD_PARTY_NOTICES.md", "LICENSE")) {
            if ($toc -notmatch [regex]::Escape($f)) {
              throw "$f is not bundled - binary distribution must carry the notices"
            }
          }
          Write-Host "No copyleft in the bundle."

      - name: Verify the native tray wiring on real Windows
        shell: pwsh
        run: |
          # 系統匣是純 ctypes 寫的,而 ctypes 的錯誤 (結構大小、簽章) 在 Linux
          # 上完全看不出來 —— 只有真的 Windows 才驗得到。這一步不需要桌面:
          # 它只檢查結構大小與視窗類別註冊,不碰 Shell_NotifyIcon。
          python standalone/tray_win32.py

      - uses: actions/upload-artifact@v4
        with:
          name: pm-standalone-exe
          path: standalone/dist/*.exe

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/standalone-v')
        uses: softprops/action-gh-release@v2
        with:
          files: standalone/dist/*.exe
