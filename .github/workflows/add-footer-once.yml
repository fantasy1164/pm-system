name: Add site footer once

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/add-footer-once.yml"

permissions:
  contents: write

jobs:
  patch-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add footer to frontend
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/index.html")
          text = path.read_text(encoding="utf-8")

          css_marker = "/* ---------- site footer ---------- */"
          footer_marker = 'id="siteFooter"'

          css = r'''
          /* ---------- site footer ---------- */
          .site-footer{
            padding:10px 14px 18px;text-align:center;color:var(--ink2);
            font-size:12px;line-height:1.7
          }
          .site-footer a{color:var(--navy);text-decoration:none}
          .site-footer a:hover{text-decoration:underline}
          .site-footer .sep{margin:0 6px;color:var(--gray)}
          @media (max-width:640px){
            .site-footer{padding:8px 10px 14px;font-size:11.5px}
            .site-footer .license-note{display:block}
            .site-footer .sep.hide-mobile{display:none}
          }
          '''

          footer = r'''
          <footer class="site-footer" id="siteFooter">
            <span>© 2026 John Wang 與貢獻者</span>
            <span class="sep">·</span>
            <a href="https://github.com/fantasy1164/pm-system" target="_blank" rel="noopener noreferrer">原始碼</a>
            <span class="sep">·</span>
            <a href="https://github.com/fantasy1164/pm-system/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">MIT License</a>
            <span class="sep hide-mobile">·</span>
            <span class="license-note">第三方元件依各自授權條款使用</span>
          </footer>
          '''

          changed = False
          if css_marker not in text:
              if "</style>" not in text:
                  raise SystemExit("找不到 </style>")
              text = text.replace("</style>", css + "\n</style>", 1)
              changed = True

          if footer_marker not in text:
              if "</main>" not in text:
                  raise SystemExit("找不到 </main>")
              text = text.replace("</main>", "</main>\n" + footer, 1)
              changed = True

          if changed:
              path.write_text(text, encoding="utf-8", newline="\n")
          PY

      - name: Commit footer
        run: |
          if git diff --quiet -- frontend/index.html; then
            echo "Footer already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/index.html
          git commit -m "加入網站作者與授權頁尾"
          git push
