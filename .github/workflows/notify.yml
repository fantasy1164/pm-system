name: 通知掃描排程

# 每 10 分鐘敲門一次;實際是否執行由系統設定的「掃描頻率」節流。
# 改掃描頻率請在系統的「訊息通知」→「自動掃描頻率」下拉調整,不需改本檔。
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}      # 允許在 GitHub 頁面手動觸發一次

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 觸發通知掃描
        run: |
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "https://pm-system-api.onrender.com/api/notify/run" \
            -H "X-Notify-Token: ${{ secrets.PM_NOTIFY_TOKEN }}")
          echo "HTTP $code"
          cat /tmp/resp.txt
          # Render 免費方案冷啟動可能較慢;非 2xx 不視為失敗 (下次排程會再試)
          if [ "$code" -ge 500 ]; then
            echo "伺服器錯誤,本次略過 (不中斷排程)"
          fi
