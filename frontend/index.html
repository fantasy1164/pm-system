/* ============================== 訊息提醒鈴鐺 ============================== */
/* 一個自足模組:輪詢後端未確認通知,驅動浮動按鈕的閃爍與循環提示音,
   面板依系統/專案分頁,可確認、可看歷史、可靜音。位置與靜音狀態存 localStorage。 */
const Bell = (function () {
  const fab = document.getElementById("bellFab");
  const panel = document.getElementById("bellPanel");
  const listEl = document.getElementById("bellList");
  const countEl = document.getElementById("bellCount");
  const muteBtn = document.getElementById("bellMute");
  const histChk = document.getElementById("bellHistChk");
  const ackAllBtn = document.getElementById("bellAckAll");

  let scope = "system";          // 目前分頁
  let unread = 0;                // 未確認總數 (跨兩個分頁)
  let muted = localStorage.getItem("pm_bell_mute") === "1";
  let pollTimer = null, chimeTimer = null, dragging = false;

  /* ---------- 提示音:純合成,不引入任何音檔 (無版權疑慮) ----------
     瀏覽器的 autoplay 政策:使用者「與頁面互動過」之前放不出聲音。所以
     AudioContext 一律等第一次點擊才建立/resume —— 這不是選擇,是硬限制。
     循環提示採「間隔重複」而非連續響:每隔十幾秒一次短音,提示而不擾人。 */
  let actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (_e) { return null; }
    }
    if (actx.state === "suspended") actx.resume();
    return actx;
  }
  function chime() {
    if (muted) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    // 兩個短音的「叮咚」,用 gain 包絡避免爆音
    [[880, 0], [660, 0.16]].forEach(([f, t]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "sine"; o.frequency.value = f;
      const s = ctx.currentTime + t;
      g.gain.setValueAtTime(0, s);
      g.gain.linearRampToValueAtTime(0.22, s + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, s + 0.32);
      o.connect(g); g.connect(ctx.destination);
      o.start(s); o.stop(s + 0.34);
    });
  }
  function startChimeLoop() {
    if (chimeTimer) return;
    chime();                                   // 立刻響一次
    chimeTimer = setInterval(chime, 20000);    // 之後每 20 秒提示一次
  }
  function stopChimeLoop() {
    if (chimeTimer) { clearInterval(chimeTimer); chimeTimer = null; }
  }

  function applyMuteUI() {
    muteBtn.textContent = muted ? "🔕" : "🔔";
    muteBtn.classList.toggle("muted", muted);
    muteBtn.title = muted ? "取消靜音" : "靜音提示音";
    if (muted) stopChimeLoop(); else if (unread > 0) startChimeLoop();
  }

  /* ---------- 閃爍與計數 ---------- */
  function applyAlert() {
    fab.classList.toggle("alert", unread > 0);   // 有未確認才閃爍光暈
    countEl.hidden = unread === 0;
    countEl.textContent = unread > 99 ? "99+" : String(unread);
    if (unread > 0 && !muted) startChimeLoop(); else stopChimeLoop();
  }

  /* ---------- 位置:拖曳 + 記住 ---------- */
  // body 套了 zoom: var(--fs-scale) 做全系統字級縮放,而 zoom 會縮放整個座標
  // 系 —— 連 position:fixed 元素的定位基準也跟著縮。所以放大字體時,同樣的
  // left:1364px 會被渲染到 1364*scale 的位置,把鈴鐺推出畫面右下角外而看不見。
  // fixed 元素在 zoom 座標系裡的可視寬高是 innerWidth/scale,定位一律用這個。
  function fsScale() {
    return parseFloat(getComputedStyle(document.body).zoom) ||
           parseFloat(document.documentElement.style.getPropertyValue("--fs-scale")) || 1;
  }
  function vw() { return innerWidth / fsScale(); }
  function vh() { return innerHeight / fsScale(); }

  function clampPos(x, y) {
    const m = 6, w = fab.offsetWidth, h = fab.offsetHeight;
    return [Math.max(m, Math.min(x, vw() - w - m)),
            Math.max(m, Math.min(y, vh() - h - m))];
  }
  // 吸附到最近的邊:比較按鈕中心到上下左右四邊的距離,貼到最短的那一邊。
  function snapToEdge(x, y) {
    const m = 6, w = fab.offsetWidth, h = fab.offsetHeight;
    const cx = x + w / 2, cy = y + h / 2;
    const dl = cx, dr = vw() - cx, dt = cy, db = vh() - cy;
    const min = Math.min(dl, dr, dt, db);
    if (min === dl) x = m;
    else if (min === dr) x = vw() - w - m;
    else if (min === dt) y = m;
    else y = vh() - h - m;
    return clampPos(x, y);
  }
  function placeFab(x, y) {
    [x, y] = clampPos(x, y);
    fab.style.left = x + "px"; fab.style.top = y + "px";
    fab.style.right = "auto"; fab.style.bottom = "auto";
    positionPanel();                 // 面板永遠跟著按鈕 (拖曳中也是)
  }
  function loadPos() {
    const saved = localStorage.getItem("pm_bell_pos");
    if (saved) { try { const p = JSON.parse(saved); return placeFab(p.x, p.y); } catch (_e) {} }
    placeFab(vw() - 52 - 24, vh() - 52 - 24);   // 預設右下 (zoom 座標系)
  }
  function savePos() {
    localStorage.setItem("pm_bell_pos",
      JSON.stringify({ x: fab.offsetLeft, y: fab.offsetTop }));
  }
  // 面板貼著按鈕開:水平上盡量與按鈕對齊但不超出畫面;垂直上,按鈕在畫面
  // 上半就往下開、下半就往上開,讓面板總是朝畫面中央展開。getBoundingClientRect
  // 回的是縮放後的實際像素,要除以 scale 換回 zoom 座標系才能跟 vw()/vh() 比。
  function positionPanel() {
    if (panel.hidden) return;
    const s = fsScale(), r = fab.getBoundingClientRect();
    const rl = r.left / s, rt = r.top / s, rb = r.bottom / s;
    const pw = panel.offsetWidth, ph = panel.offsetHeight, m = 8;
    let left = Math.min(rl, vw() - pw - m); left = Math.max(m, left);
    let top = (rt < vh() / 2) ? rb + m : rt - ph - m;
    top = Math.max(m, Math.min(top, vh() - ph - m));
    panel.style.left = left + "px"; panel.style.top = top + "px";
  }

  // 拖曳:用 pointer 事件,同時支援滑鼠與觸控。移動超過門檻才算拖曳,
  // 否則視為點擊 (開關面板) —— 不然使用者永遠沒辦法「只是按一下」。
  function initDrag() {
    let sx, sy, ox, oy, moved;
    fab.addEventListener("pointerdown", (e) => {
      dragging = true; moved = false;
      sx = e.clientX; sy = e.clientY; ox = fab.offsetLeft; oy = fab.offsetTop;
      fab.setPointerCapture(e.pointerId);
    });
    fab.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if (!moved && Math.hypot(dx, dy) < 5) return;   // 門檻內不算拖
      moved = true; placeFab(ox + dx, oy + dy);
    });
    fab.addEventListener("pointerup", (e) => {
      dragging = false;
      fab.releasePointerCapture(e.pointerId);
      if (moved) {
        // 放開時吸附到最近的邊,並記住位置
        const [x, y] = snapToEdge(fab.offsetLeft, fab.offsetTop);
        placeFab(x, y); savePos();
      } else {
        togglePanel();                               // 沒移動 = 點擊
      }
    });
  }

  /* ---------- 面板 ---------- */
  // suppressOutside:剛用按鈕開關過的這一輪,別讓 document 的「點外面收起」
  // 也跟著處理同一個事件 —— 否則按鈕的 pointerup 開了面板,document 監聽又
  // 在同一次互動把它關掉 (或反之),面板看起來就「點了沒反應」。
  let suppressOutside = false;
  function togglePanel() {
    suppressOutside = true;
    setTimeout(() => { suppressOutside = false; }, 0);
    panel.hidden ? open() : close();
  }
  function open() {
    ensureAudio();                 // 借這次使用者互動解鎖音訊
    panel.hidden = false;
    positionPanel();
    render();
  }
  function close() { panel.hidden = true; }

  async function render() {
    const hist = histChk.checked;
    let data;
    try { data = await api("/notify/bell" + (hist ? "?history=1" : "")); }
    catch (_e) { return; }
    unread = data.unread; applyAlert();
    const items = data.items.filter((o) => o.scope === scope);
    if (!items.length) {
      listEl.innerHTML = '<div class="bell-empty">' +
        (hist ? "沒有訊息" : "沒有待確認的訊息") + "</div>";
      return;
    }
    listEl.innerHTML = items.map((o) => {
      const cls = "bell-item" + (o.read ? " read" : "");
      const ack = o.read ? "" :
        `<button class="bell-ack" data-id="${o.id}">確認</button>`;
      return `<div class="${cls}"><span class="bell-dot"></span>` +
        `<div class="bell-body"><div class="bell-subj">${esc(o.subject)}</div>` +
        `<div class="bell-meta">${o.created_at}</div></div>${ack}</div>`;
    }).join("");
  }

  async function ack(id) {
    try { await api("/notify/bell/" + id + "/ack", { method: "POST" }); }
    catch (_e) { return; }
    await render();
  }
  async function ackAll() {
    try { await api("/notify/bell/ack-all", { method: "POST" }); }
    catch (_e) { return; }
    await render();
  }

  async function poll() {
    try {
      const data = await api("/notify/bell");
      unread = data.unread; applyAlert();
      if (!panel.hidden) render();
    } catch (_e) { /* 離線/未登入:靜默,下一輪再試 */ }
  }

  function start() {
    fab.style.display = "flex";    // 進入應用才顯示 (登入畫面不出現)
    loadPos(); applyMuteUI(); initDrag();
    // 分頁切換
    panel.querySelectorAll(".bell-tab").forEach((b) => {
      b.addEventListener("click", () => {
        panel.querySelectorAll(".bell-tab").forEach((x) => x.classList.remove("active"));
        b.classList.add("active"); scope = b.dataset.scope; render();
      });
    });
    histChk.addEventListener("change", render);
    ackAllBtn.addEventListener("click", ackAll);
    muteBtn.addEventListener("click", () => {
      muted = !muted; localStorage.setItem("pm_bell_mute", muted ? "1" : "0");
      applyMuteUI();
    });
    listEl.addEventListener("click", (e) => {
      const b = e.target.closest(".bell-ack");
      if (b) ack(Number(b.dataset.id));
    });
    // 點面板外收起 (但別跟按鈕自己的開關搶同一次互動,見 suppressOutside)
    document.addEventListener("pointerdown", (e) => {
      if (panel.hidden || suppressOutside) return;
      if (!panel.contains(e.target) && !fab.contains(e.target)) close();
    });
    fab.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); togglePanel(); }
    });
    addEventListener("resize", () => { loadPos(); positionPanel(); });

    poll();
    pollTimer = setInterval(poll, 30000);   // 每 30 秒輪詢一次
  }

  return {
    start,
    // 字級 (zoom) 改變後,可視座標系跟著縮放,原本的位置可能落到畫面外。
    // 用目前的位置重新 clamp 一次,把鈴鐺拉回可見範圍;面板一併重定位。
    reposition() {
      const [x, y] = clampPos(fab.offsetLeft, fab.offsetTop);
      placeFab(x, y); savePos();
    },
  };
})();

/* ============================== 批次匯入專案 ============================== */
/* 範本刻意用 CSV (UTF-8 BOM) 而非 xlsx:單機版離線,前端載不到 SheetJS 這類
   CDN 函式庫;後端的 xlsx 函式庫也被排除在 exe 之外 (零相依原則)。CSV 純 JS
   就能產生與解析,BOM 讓 Excel 開啟中文不亂碼,雙擊即可編輯 —— 對使用者而言
   體驗與 xlsx 幾乎無異。 */
const Importer = (function () {
  const btn = document.getElementById("tplBtn");
  const overlay = document.getElementById("dropOverlay");

  /* ---------- 範本欄位定義:單一事實來源,產生範本與解析匯入共用 ----------
     key: 後端欄位;label: 範本欄名 (標 * 為必填);match: 解析時認欄位的關鍵字
     (使用者可能微調欄名,用關鍵字比對比整串相等寬容);conv: 字串→值 */
  const num = (s) => { const n = parseInt(String(s).replace(/[,\s]/g, ""), 10);
                       return Number.isFinite(n) ? n : null; };
  const yn = (s) => /^(是|y|yes|1|true|v)$/i.test(String(s).trim()) ? 1 : 0;
  const dt = (s) => {                       // 接受西元 YYYY-MM-DD 或民國 115/01/31
    s = String(s).trim().replace(/\./g, "-").replace(/\//g, "-");
    let m = s.match(/^(\d{2,4})-(\d{1,2})-(\d{1,2})$/);
    if (!m) return null;
    let y = +m[1];
    if (y < 1911) y += 1911;                // 民國年 → 西元
    return `${y}-${String(+m[2]).padStart(2, "0")}-${String(+m[3]).padStart(2, "0")}`;
  };
  const st = (s) => ({ "進行中": "ongoing", "未成案": "not_awarded", "已結案": "closed",
                       "ongoing": "ongoing", "not_awarded": "not_awarded",
                       "closed": "closed" })[String(s).trim()] || null;
  const COLS = [
    { key: "name",       label: "*案名",                    match: "案名", conv: (s) => s.trim() },
    { key: "year",       label: "*年度(民國,例115)",        match: "年度", conv: num },
    { key: "status",     label: "狀態(進行中/未成案/已結案)", match: "狀態", conv: st },
    { key: "contract_no", label: "契約號",                  match: "契約", conv: (s) => s.trim() },
    { key: "part_no",    label: "料號",                     match: "料號", conv: (s) => s.trim() },
    { key: "so_number",  label: "SO編號",                   match: "so",   conv: (s) => s.trim() },
    { key: "start_date", label: "履約起日(YYYY-MM-DD)",     match: "履約起", conv: dt },
    { key: "end_date",   label: "履約迄日(YYYY-MM-DD)",     match: "履約迄", conv: dt },
    { key: "kickoff_date", label: "開工日(YYYY-MM-DD)",     match: "開工", conv: dt },
    { key: "awarded_amount", label: "決標金額",             match: "決標", conv: num },
    { key: "warranty_years", label: "保固年數",             match: "保固", conv: num },
    { key: "notify_days_before", label: "里程碑提醒天數",   match: "提醒", conv: num },
    { key: "participants", label: "參與人員",               match: "參與", conv: (s) => s.trim() },
    { key: "contract_scan", label: "合約掃描(是/否)",       match: "合約掃", conv: yn },
    { key: "nda_date",   label: "NDA簽署日(YYYY-MM-DD)",    match: "nda簽", conv: dt },
    { key: "nda_scan",   label: "NDA掃描(是/否)",           match: "nda掃", conv: yn },
    { key: "notes",      label: "備註",                     match: "備註", conv: (s) => s.trim() },
  ];
  const BANNER = "請使用範本檔填寫專案並存檔後,將檔案拖曳至系統任意畫面即可完成匯入!" +
                 "(標*為必填;日期格式 YYYY-MM-DD 或民國 115-01-31;此說明列與範例列不會被匯入)";
  const EXAMPLE = ["(範例)機房搬遷工程", "115", "進行中", "AC-115-0001", "P-10001",
                   "SO-2026-0001", "2026-02-01", "2026-11-30", "2026-02-15", "5000000",
                   "2", "14", "王小明、李小華", "是", "2026-01-20", "是", "分三期驗收"];

  /* ---------- 產生範本 ---------- */
  function csvCell(s) {
    s = String(s ?? "");
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  function downloadTemplate() {
    const rows = [[BANNER], COLS.map((c) => c.label), EXAMPLE];
    const csv = "\uFEFF" + rows.map((r) => r.map(csvCell).join(",")).join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "專案批次匯入範本.csv";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    toast("範本已下載,填寫存檔後拖曳到畫面即可匯入");
  }

  /* ---------- CSV 解析 (處理引號、逗號、跨行欄位) ---------- */
  function parseCSV(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = [[]]; let field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQ) {
        if (ch === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else inQ = false;
        } else field += ch;
      } else if (ch === '"') inQ = true;
      else if (ch === ",") { rows[rows.length - 1].push(field); field = ""; }
      else if (ch === "\n" || ch === "\r") {
        if (ch === "\r" && text[i + 1] === "\n") i++;
        rows[rows.length - 1].push(field); field = "";
        rows.push([]);
      } else field += ch;
    }
    rows[rows.length - 1].push(field);
    return rows.filter((r) => r.some((c) => c.trim() !== ""));
  }

  /* ---------- 匯入 ---------- */
  async function importFile(file) {
    if (!/\.csv$/i.test(file.name)) {
      return toast("請使用範本產生的 CSV 檔 (不支援 " + (file.name.split(".").pop() || "此格式") + ")", true);
    }
    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length) return toast("檔案是空的", true);

    // 找欄位標題列 (含「案名」關鍵字那列);它之前的列都是說明,一律略過
    const headIdx = rows.findIndex((r) => r.some((c) => c.includes("案名")));
    if (headIdx === -1) return toast("找不到欄位標題列 (需含「案名」),請使用下載的範本", true);
    const head = rows[headIdx].map((h) => h.toLowerCase().replace(/[*\s]/g, ""));
    const colOf = {};      // COLS index -> csv column index
    COLS.forEach((c, ci) => {
      const idx = head.findIndex((h) => h.includes(c.match.toLowerCase()));
      if (idx !== -1) colOf[ci] = idx;
    });
    if (colOf[0] === undefined || colOf[1] === undefined) {
      return toast("範本缺少必填欄位 (案名/年度),請使用下載的範本", true);
    }

    // 逐列轉物件
    const items = [], bad = [];
    rows.slice(headIdx + 1).forEach((r, i) => {
      const rowNo = headIdx + i + 2;                       // 給人看的列號
      const nameRaw = (r[colOf[0]] || "").trim();
      if (!nameRaw || nameRaw.startsWith("(範例)")) return; // 空列/範例列:安靜略過
      const obj = {};
      COLS.forEach((c, ci) => {
        if (colOf[ci] === undefined) return;
        const raw = (r[colOf[ci]] || "").trim();
        if (raw === "") return;
        const v = c.conv(raw);
        if (v !== null && v !== "") obj[c.key] = v;
      });
      // 必填檢查 (需求4:必填不完整就不匯入)
      if (!obj.name || !Number.isInteger(obj.year)) {
        bad.push(`第${rowNo}列 (${nameRaw.slice(0, 12)}…):缺案名或年度`);
        return;
      }
      if (!obj.status) obj.status = "ongoing";
      items.push(obj);
    });
    if (!items.length && !bad.length) return toast("範本裡沒有可匯入的資料列", true);

    // 需求5:去重 —— 檔案內部 (同年度+案名取第一筆),以及與系統既有專案比對
    const seen = new Set(), unique = [];
    let dupInFile = 0;
    for (const it of items) {
      const k = it.year + "\u0000" + it.name;
      if (seen.has(k)) { dupInFile++; continue; }
      seen.add(k); unique.push(it);
    }
    const years = [...new Set(unique.map((i) => i.year))];
    const existing = new Set();
    for (const y of years) {
      try {
        const ps = await api("/projects?year=" + y);
        ps.forEach((p) => {
          existing.add(y + "\u0000" + p.name);
          if (p.contract_no) existing.add(y + "\u0000#" + p.contract_no);
        });
      } catch (_e) { /* 該年度還不存在:沒有既有專案,無需比對 */ }
    }
    let dupExisting = 0;
    const todo = unique.filter((it) => {
      if (existing.has(it.year + "\u0000" + it.name)) { dupExisting++; return false; }
      if (it.contract_no && existing.has(it.year + "\u0000#" + it.contract_no)) { dupExisting++; return false; }
      return true;
    });

    // 逐筆建立
    let ok = 0; const failed = [];
    for (const it of todo) {
      try { await api("/projects", { method: "POST", body: JSON.stringify(it) }); ok++; }
      catch (e) { failed.push(`${it.name}:${e.message || "失敗"}`); }
    }

    // 匯入總結
    const parts = [`成功 ${ok} 筆`];
    if (dupInFile + dupExisting) parts.push(`重複略過 ${dupInFile + dupExisting} 筆`);
    if (bad.length) parts.push(`缺必填 ${bad.length} 筆`);
    if (failed.length) parts.push(`失敗 ${failed.length} 筆`);
    toast("匯入完成:" + parts.join("、"), bad.length + failed.length > 0);
    if (bad.length) console.warn("缺必填明細:\n" + bad.join("\n"));
    if (failed.length) console.warn("匯入失敗明細:\n" + failed.join("\n"));
    if (ok) await refresh();
  }

  /* ---------- hover 淡入淡出 (需求1) ----------
     按鈕不是 #content 的子元素 (content 會被 innerHTML 重繪整個洗掉),
     所以掛在外面、hover 進 content 時定位到它的右上角並淡入。滑鼠從
     content 移到按鈕上會觸發 content 的 mouseleave —— 用延遲隱藏 + 進入
     按鈕取消,避免「還沒點到就消失」。 */
  let hideT = null;
  function showBtn() {
    if (S.view !== "table") return;
    clearTimeout(hideT);
    const r = document.getElementById("content").getBoundingClientRect();
    btn.style.top = Math.max(8, r.top + 8) + "px";
    btn.style.left = (r.right - btn.offsetWidth - 16) + "px";
    btn.classList.add("show");
  }
  function hideBtnSoon() {
    clearTimeout(hideT);
    hideT = setTimeout(() => btn.classList.remove("show"), 180);
  }

  /* ---------- 拖放 (需求3:拖到任意畫面) ----------
     dragenter/leave 會在子元素間狂發,用計數器判斷「真的離開視窗」。 */
  let dragDepth = 0;
  function isFileDrag(e) {
    return e.dataTransfer && [...(e.dataTransfer.types || [])].includes("Files");
  }
  function initDnD() {
    document.addEventListener("dragenter", (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault(); dragDepth++;
      overlay.hidden = false;
    });
    document.addEventListener("dragover", (e) => { if (isFileDrag(e)) e.preventDefault(); });
    document.addEventListener("dragleave", (e) => {
      if (!isFileDrag(e)) return;
      if (--dragDepth <= 0) { dragDepth = 0; overlay.hidden = true; }
    });
    document.addEventListener("drop", (e) => {
      if (!isFileDrag(e)) return;
      e.preventDefault(); dragDepth = 0; overlay.hidden = true;
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) importFile(f);
    });
  }

  function start() {
    const content = document.getElementById("content");
    content.addEventListener("mouseenter", showBtn);
    content.addEventListener("mouseleave", hideBtnSoon);
    btn.addEventListener("mouseenter", () => clearTimeout(hideT));
    btn.addEventListener("mouseleave", hideBtnSoon);
    btn.addEventListener("click", downloadTemplate);
    initDnD();
  }
  return { start, hideBtn: () => btn.classList.remove("show") };
})();

(async function boot() {
  try {
    await waitBackend();
    const cfg = await api("/auth/config");
    S.auth = { enabled: cfg.auth_enabled, clientId: cfg.google_client_id };
    // 單機版不寄信,訊息通知整個模組沒有意義 → 隱藏該分頁。
    // 舊版後端不回 mode 時 cfg.mode 為 undefined → false,行為不變。
    S.standalone = cfg.mode === "standalone";
    if (S.auth.enabled) {
      if (!getTok()) { renderUserChip(); applyPerms(); return renderLogin(); }
      try { S.me = await api("/auth/me"); }
      catch (_e) { return; }   // 401 已由 api() 導回登入
    }
    await enterApp();
  } catch (e) { console.error(e); }
})();
</script>
