<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>專案管理系統</title>
<script>
document.documentElement.dataset.theme =
  localStorage.getItem("pm_theme") ||
  (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
document.documentElement.style.setProperty("--fs-scale",
  String(parseFloat(localStorage.getItem("pm_fs")) || 1));
</script>
<style>
:root{
  /* 日間:柔和冷灰藍底 → 純白面板浮起 → 板岩藍表頭,層次分明好讀 */
  --bg:#EEF1F5; --panel:#FFFFFF; --panel2:#F4F6FA; --ink:#141A22; --ink2:#525E6E;
  --line:#D2D9E3; --line2:#E4E9F0; --hover:#EAF1F6; --chip:#EDF0F5;
  --teal:#0B7A6E; --teal-bg:#CDEBE5; --amber:#A85A00; --amber-bg:#FBE6C7;
  --gray:#5F6B7A; --gray-bg:#E3E7ED; --red:#C22E28; --navy:#1B3A63;
  --thead:#3A506E; --thead-ink:#FFFFFF; --thead-line:#2C4059;   /* 表頭:深板岩藍配白字,強烈區隔 */
  --foot:#DDE4EE;
  --radius:8px;
}
:root{
  --yc0:#0E7490; --yc1:#B45309; --yc2:#7C3AED;
  --yc3:#BE185D; --yc4:#4D7C0F; --yc5:#2563EB;
}
html[data-theme="dark"]{
  --yc0:#4CC3DD; --yc1:#F0A63A; --yc2:#B79CF7;
  --yc3:#F472B6; --yc4:#9CCC5A; --yc5:#7DA7F8;
  /* 夜間:深藍黑底 → 面板明顯浮起 → 表頭再亮一階,層次清楚且護眼 */
  --bg:#0C0F14; --panel:#171C24; --panel2:#1F2630; --ink:#EAEEF3; --ink2:#9BA6B4;
  --line:#313A47; --line2:#252D38; --hover:#1C2933; --chip:#252D38;
  --teal:#35C9B5; --teal-bg:#0E3D38; --amber:#F5B04A; --amber-bg:#3E2C12;
  --gray:#9AA5B3; --gray-bg:#2C333D; --red:#FB7C74; --navy:#A9C6EE;
  --thead:#3B4A5F; --thead-ink:#EAF2FD; --thead-line:#54657D;   /* 表頭:明顯提亮配亮字 */
  --foot:#232C37;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{--fs-scale:1}
body{background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
  font-size:15px;line-height:1.6;zoom:var(--fs-scale)}
button{font:inherit;cursor:pointer}
input,select,textarea{font:inherit;color:var(--ink)}

/* ---------- header ---------- */
header{background:var(--panel);border-bottom:1px solid var(--line);
  padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  position:sticky;top:0;z-index:20}
header h1{font-size:17px;font-weight:600;margin:0;color:var(--navy);letter-spacing:.02em}
.year-tabs{display:flex;gap:4px;flex-wrap:wrap}
.year-tab{border:1px solid var(--line);background:var(--panel);border-radius:999px;
  padding:3px 14px;color:var(--ink2)}
.year-tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
.spacer{flex:1}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.view-toggle button{border:0;background:var(--panel);padding:5px 14px;color:var(--ink2)}
.view-toggle button.active{background:var(--teal);color:#fff}
.btn{border:1px solid var(--line);background:var(--panel);border-radius:var(--radius);
  padding:5px 12px;color:var(--ink)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn.danger{background:#fff;border-color:var(--red);color:var(--red)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;
  flex:0 0 auto;vertical-align:baseline}
.user-chip{font-size:12.5px;color:var(--ink2);border:1px dashed var(--line);
  border-radius:999px;padding:3px 10px;background:transparent}

/* ---------- layout ---------- */
main{padding:10px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
.fs-ctrl{display:inline-flex;gap:0}
.fs-btn{padding:5px 9px;font-weight:700;min-width:34px}
.fs-btn#fsDown{border-radius:var(--radius) 0 0 var(--radius);font-size:12px}
.fs-btn#fsUp{border-radius:0 var(--radius) var(--radius) 0;border-left:none;font-size:15px}
.state-msg{padding:48px 16px;text-align:center;color:var(--ink2)}

/* ---------- table view ---------- */
.tbl-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:960px;font-size:13.5px}
th{position:sticky;top:0;background:var(--thead);color:var(--thead-ink);font-weight:700;
  text-align:center;padding:9px 10px;border:1px solid var(--thead-line);
  border-bottom:2px solid var(--thead-line);white-space:nowrap;letter-spacing:.02em}
td{padding:8px 10px;border:1px solid var(--line2);vertical-align:middle;
  white-space:nowrap;text-align:center}
tr.row:hover td{background:var(--hover);cursor:pointer}
td.name{white-space:normal;font-weight:500;overflow-wrap:anywhere;text-align:left}
td.num{font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:12px;border-radius:999px;padding:1px 9px}
.badge.ongoing{background:var(--teal-bg);color:var(--teal)}
.badge.not_awarded{background:var(--amber-bg);color:var(--amber)}
.badge.closed{background:var(--gray-bg);color:var(--gray)}
.budget-chip{display:flex;width:max-content;align-items:stretch;font-size:12px;
  border:1.5px solid var(--yc,var(--ink2));border-radius:9px;overflow:hidden;
  margin:2px auto;font-variant-numeric:tabular-nums;line-height:1.55}
.budget-chip .by{background:var(--yc,var(--ink2));color:var(--panel);
  font-weight:700;padding:0 7px;letter-spacing:.02em}
.budget-chip .ba{background:var(--panel);color:var(--ink);
  font-weight:600;padding:0 8px}
.yc0{--yc:var(--yc0)} .yc1{--yc:var(--yc1)} .yc2{--yc:var(--yc2)}
.yc3{--yc:var(--yc3)} .yc4{--yc:var(--yc4)} .yc5{--yc:var(--yc5)}
.budget-chip.cur{box-shadow:0 0 0 2px color-mix(in srgb, var(--yc) 35%, transparent)}
tfoot td{position:sticky;bottom:0;background:var(--panel2);
  border:none;border-top:2px solid var(--line);font-weight:700;
  padding:9px 10px}
tfoot td.lbl{text-align:right;color:var(--navy);font-weight:600;
  letter-spacing:.02em}
tfoot tr td:first-child{border-bottom-left-radius:8px}
tfoot tr td:last-child{border-bottom-right-radius:8px}
tr.grp td.grp-td{background:var(--panel2);text-align:left;font-weight:600;
  color:var(--ink2);padding:6px 10px;border:1px solid var(--line);
  cursor:grab;user-select:none}
tr.grp td.grp-td::before{content:"⣿";color:var(--gray);
  margin-right:8px;font-size:11px;letter-spacing:-2px;opacity:0.55}
tr.grp.grp-dragging{opacity:0.4}
tr.grp.grp-drop-target td.grp-td{box-shadow:inset 0 3px 0 var(--teal)}
tr.grp td.grp-td.ongoing{color:var(--teal)}
tr.grp td.grp-td.not_awarded{color:var(--amber)}
tr.grp td.grp-td.closed{color:var(--gray)}
tr.grp td.grp-td.warranty{color:var(--navy)}
.wty-sec-h{font-weight:700;font-size:15px;padding:12px 4px 8px;margin-top:6px;
  border-bottom:2px solid var(--line)}
.wty-sec-h.active{color:var(--navy)}
.wty-sec-h.expired{color:var(--gray)}
.scan{font-size:14px} .scan.none{color:var(--ink2)}
.col-resizer{position:absolute;top:0;right:-4px;width:8px;height:100%;
  cursor:col-resize;z-index:5;touch-action:none}
.col-resizer::after{content:"";position:absolute;top:0;bottom:0;left:3px;
  width:2px;background:var(--teal);opacity:0;transition:opacity .15s}
.col-resizer:hover::after,.col-resizer.dragging::after{opacity:.8}
.g-names{position:relative}
td.notes{white-space:normal;min-width:140px;color:var(--ink2);font-size:12.5px;text-align:left}
.wty{display:inline-block;font-size:11px;color:var(--teal);
  border:1px solid var(--teal);border-radius:999px;padding:0 7px;
  margin-left:6px;vertical-align:1px;white-space:nowrap;font-weight:500}
.sub-label{display:inline-block;font-size:11px;border-radius:999px;padding:0 8px;
  margin-left:6px;vertical-align:1px;white-space:nowrap;font-weight:600}

/* ---------- gantt ---------- */
.gantt-bar-ctl{display:flex;gap:8px;align-items:center;padding:10px 12px;
  border-bottom:1px solid var(--line);flex-wrap:wrap}
.legend{display:flex;gap:14px;font-size:12.5px;color:var(--ink2);flex-wrap:wrap}
.legend i{display:inline-block;width:14px;height:9px;border-radius:2px;margin-right:4px;vertical-align:baseline}
.gantt{display:flex;align-items:stretch}
.g-names{flex:0 0 190px;border-right:1px solid var(--line);background:var(--panel2)}
.g-names .g-head{height:34px;border-bottom:1px solid var(--line);display:flex;
  align-items:center;padding:0 10px;font-size:12px;color:var(--ink2)}
.g-name{height:44px;border-bottom:1px solid var(--line2);padding:4px 10px;cursor:pointer;
  display:flex;align-items:center;gap:6px;overflow:hidden}
.g-name:hover{background:var(--hover)}
.g-name .txt{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.g-name .nm{font-size:13px;font-weight:500;line-height:1.2;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;overflow-wrap:anywhere;word-break:break-word}
.g-name .sub{font-size:11.5px;color:var(--ink2);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.g-scroll{flex:1;overflow-x:auto;overflow-y:hidden}
.g-scroll svg{display:block}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(31,41,51,.45);z-index:50;
  display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;overflow:auto}
.modal{background:var(--panel);border-radius:12px;max-width:640px;width:100%;
  padding:18px 20px 20px}
.modal h2{margin:0 0 14px;font-size:16px;color:var(--navy)}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.frm label{display:flex;flex-direction:column;gap:3px;font-size:12.5px;color:var(--ink2)}
.frm label.full{grid-column:1/-1}
/* 編輯視窗分組區塊 */
.fsecs{display:flex;flex-direction:column;gap:14px}
.fsec{border:1px solid var(--line);border-radius:10px;padding:12px 14px 14px;
  background:var(--panel-2,rgba(127,127,127,.04))}
.fsec>.fsec-h{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;
  color:var(--navy);margin-bottom:10px;letter-spacing:.02em}
.fsec>.fsec-h .dot{width:8px;height:8px;border-radius:50%;flex:none}
.fsec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.fsec-grid label{display:flex;flex-direction:column;gap:3px;font-size:12.5px;color:var(--ink2)}
.fsec-grid label.full{grid-column:1/-1}
/* 掃描檔核選:做成有標籤的橫向勾選,而非孤立 checkbox */
.chk-row{flex-direction:row!important;align-items:center;gap:8px;
  padding:7px 10px;border:1px dashed var(--line);border-radius:7px;
  background:var(--panel);cursor:pointer;color:var(--ink)}
.chk-row input{width:16px;height:16px;cursor:pointer;margin:0}
.frm input,.frm select,.frm textarea{border:1px solid var(--line);border-radius:6px;
  padding:6px 8px;background:var(--panel);color:var(--ink)}
.frm textarea{resize:vertical;min-height:52px}
.bud-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.bud-row input{border:1px solid var(--line);border-radius:6px;padding:5px 8px;
  background:var(--panel);color:var(--ink)}
select{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:4px 6px}
.bud-row input.y{width:84px}
.bud-row input.a{flex:1}
.bud-row button{border:0;background:none;color:var(--red);font-size:16px;padding:0 4px}
.modal-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.modal-actions .btn.danger{margin-right:auto}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
  background:#1F2933;color:#fff;padding:8px 18px;border-radius:999px;
  font-size:13.5px;opacity:0;transition:opacity .25s;z-index:99;pointer-events:none;
  max-width:90vw}
#toast.show{opacity:.94}
#toast.err{background:var(--red)}

/* ---------- mobile ---------- */
@media (max-width:640px){
  header{padding:6px 8px;gap:6px}
  header h1{font-size:14.5px}
  .btn,.year-tab{padding:4px 10px;font-size:13.5px}
  .view-toggle button{padding:4px 10px;font-size:13.5px}
  main{padding:5px}
  .panel{border-radius:8px}
  .g-names{flex-basis:118px}
  .g-name .nm{font-size:12px}
  .frm{grid-template-columns:1fr}
  .fsec-grid{grid-template-columns:1fr}
  .overlay{padding:8px 6px}
  .modal{padding:14px 14px 16px}
}
/* 手機橫屏:垂直空間極省 */
@media (max-height:520px){
  header{padding:3px 8px;gap:6px}
  header h1{font-size:13px}
  .btn,.year-tab,.view-toggle button{padding:2px 9px;font-size:12.5px}
  .user-chip{font-size:11.5px;padding:2px 8px}
  main{padding:4px}
  th,td{padding:5px 8px}
}
@media (prefers-reduced-motion:reduce){ *{transition:none!important} }

/* ---------- site footer ---------- */
.site-footer{
  padding:10px 14px 18px;text-align:center;color:var(--ink2);
  font-size:12px;line-height:1.7
}
.site-footer a{color:var(--navy);text-decoration:none}
.site-footer a:hover{text-decoration:underline}
.site-footer .sep{margin:0 6px;color:var(--gray)}
@media (max-width:640px){
  .site-footer{padding:8px 10px 14px;font-size:11.5px}
  .site-footer .license-note{display:block}
  .site-footer .sep.hide-mobile{display:none}
}

/* ============================== 訊息提醒鈴鐺 ============================== */
.bell-fab{
  position:fixed; z-index:900; width:52px; height:52px; border-radius:50%;
  display:none; align-items:center; justify-content:center; cursor:grab;
  background:var(--navy); color:#fff; box-shadow:0 4px 14px rgba(0,0,0,.28);
  user-select:none; touch-action:none;
}
.bell-fab:active{ cursor:grabbing; }
.bell-fab .bell-icon{ position:relative; z-index:1; }
/* 光暈:有未確認訊息時漸強/減弱閃爍。放在按鈕底下,不影響點擊 */
.bell-glow{
  position:absolute; inset:-6px; border-radius:50%; pointer-events:none;
  opacity:0; background:radial-gradient(circle, var(--amber) 0%, transparent 70%);
}
.bell-fab.alert .bell-glow{ animation:bellGlow 1.6s ease-in-out infinite; }
@keyframes bellGlow{
  0%,100%{ opacity:0; transform:scale(.85); }
  50%    { opacity:.85; transform:scale(1.25); }
}
/* 有未確認時鈴鐺本體也輕輕擺動,強化「有事」的感覺 */
.bell-fab.alert .bell-icon{ animation:bellSwing 1.6s ease-in-out infinite; transform-origin:top center; }
@keyframes bellSwing{
  0%,100%{ transform:rotate(0); } 15%{ transform:rotate(12deg); }
  30%{ transform:rotate(-10deg); } 45%{ transform:rotate(6deg); } 60%{ transform:rotate(0); }
}
.bell-count{
  position:absolute; top:-4px; right:-4px; min-width:20px; height:20px; padding:0 5px;
  border-radius:10px; background:var(--red); color:#fff; font-size:12px; font-weight:700;
  display:flex; align-items:center; justify-content:center; z-index:2; box-sizing:border-box;
}
.bell-panel{
  position:fixed; z-index:901; width:340px; max-width:calc(100vw - 24px);
  max-height:min(70vh,520px); display:flex; flex-direction:column;
  background:var(--panel); color:var(--ink); border:1px solid var(--line);
  border-radius:12px; box-shadow:0 10px 34px rgba(0,0,0,.32); overflow:hidden;
}
/* hidden 屬性只是弱預設的 display:none,會被上面的 display:flex 蓋過 —— 那正是
   面板「明明 hidden 卻一直顯示」的原因。明確讓 hidden 強制隱藏。 */
.bell-panel[hidden]{ display:none; }
.bell-head{ display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; border-bottom:1px solid var(--line); background:var(--thead); }
.bell-tabs{ display:flex; gap:4px; }
.bell-tab{ border:0; background:transparent; color:var(--thead-ink); opacity:.7;
  padding:5px 12px; border-radius:6px; cursor:pointer; font-size:14px; font-weight:600; }
.bell-tab.active{ opacity:1; background:rgba(255,255,255,.16); }
.bell-tool{ border:0; background:transparent; cursor:pointer; font-size:18px; line-height:1;
  padding:4px 6px; border-radius:6px; }
.bell-tool.muted{ opacity:.45; }
.bell-sub{ display:flex; align-items:center; justify-content:space-between;
  padding:7px 12px; border-bottom:1px solid var(--line); font-size:13px; }
.bell-hist{ display:flex; align-items:center; gap:6px; color:var(--gray); cursor:pointer; }
.bell-ackall{ border:1px solid var(--line); background:var(--chip); color:var(--ink);
  padding:3px 10px; border-radius:6px; cursor:pointer; font-size:13px; }
.bell-ackall:hover{ background:var(--hover); }
.bell-list{ overflow-y:auto; padding:4px 0; }
.bell-item{ display:flex; gap:10px; padding:10px 12px; border-bottom:1px solid var(--line);
  align-items:flex-start; }
.bell-item.read{ opacity:.55; }
.bell-dot{ flex:0 0 auto; width:8px; height:8px; border-radius:50%; margin-top:6px;
  background:var(--amber); }
.bell-item.read .bell-dot{ background:var(--line); }
.bell-body{ flex:1; min-width:0; }
.bell-subj{ font-size:13.5px; line-height:1.4; word-break:break-word; }
.bell-meta{ font-size:11.5px; color:var(--gray); margin-top:3px; }
.bell-ack{ flex:0 0 auto; border:1px solid var(--line); background:transparent;
  color:var(--teal); border-radius:6px; padding:2px 8px; cursor:pointer; font-size:12px; }
.bell-ack:hover{ background:var(--hover); }
.bell-empty{ padding:28px 16px; text-align:center; color:var(--gray); font-size:13px; }
@media (max-width:480px){ .bell-panel{ width:calc(100vw - 24px); } }
/* ============================== 批次匯入 ============================== */
.tpl-btn{
  position:fixed; z-index:850; padding:7px 14px; border-radius:8px;
  border:1px solid var(--line); background:var(--panel); color:var(--teal);
  font-size:13.5px; font-weight:600; cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
  opacity:0; pointer-events:none;            /* 淡出時也不擋滑鼠 */
  transition:opacity .25s ease;
}
.tpl-btn.show{ opacity:1; pointer-events:auto; }
.tpl-btn:hover{ background:var(--hover); }
.drop-overlay{
  position:fixed; inset:0; z-index:950; display:flex;
  align-items:center; justify-content:center;
  background:rgba(20,30,45,.55); backdrop-filter:blur(2px);
}
.drop-overlay[hidden]{ display:none; }       /* display:flex 會蓋過 hidden,明確擋掉 */
.drop-box{
  padding:38px 56px; border:3px dashed #fff; border-radius:16px;
  color:#fff; font-size:22px; font-weight:700; text-align:center;
  background:rgba(27,58,99,.35); line-height:1.6;
}
.drop-box small{ font-size:14px; font-weight:400; opacity:.85; }
</style>
</head>
<body>
<header>
  <h1>專案管理系統</h1>
  <button class="user-chip" id="teamChip" style="display:none" title="點擊切換團隊"></button>
  <nav class="year-tabs" id="yearTabs" aria-label="年度"></nav>
  <button class="btn" id="btnNewYear" title="建立新年度並複製跨年度專案">＋ 新年度</button>
  <span class="spacer"></span>
  <div class="view-toggle" role="tablist">
    <button id="vTable" class="active">進度總表</button>
    <button id="vGantt">甘特圖</button>
    <button id="vWarranty">保固總表</button>
    <button id="vUsers" style="display:none">權限設定</button>
    <button id="vNotify" style="display:none">訊息通知</button>
  </div>
  <button class="btn primary" id="btnAdd">＋ 新增專案</button>
  <div class="fs-ctrl" title="調整全系統字體大小">
    <button class="btn fs-btn" id="fsDown" title="縮小字體">A−</button>
    <button class="btn fs-btn" id="fsUp" title="放大字體">A+</button>
  </div>
  <button class="btn" id="themeBtn" title="切換深/淺色主題">🌓</button>
  <button class="user-chip" id="userChip" title="點擊設定操作者名稱"></button>
</header>

<main>

<script>
"use strict";
/* ============================== 設定與狀態 ============================== */
// API 位址三段式判斷 (依序):
//   1. localStorage.pm_api  — 手動覆寫,除錯用
//   2. window.PM_SERVED_BY_FLASK — 本頁由後端自己吐出 (單機版):
//      同源相對路徑,不論後端跑在哪個 port 都對,連 CORS 都不需要。
//      這個旗標由 backend/app.py 在回應時注入,靜態檔本身沒有它 ——
//      所以 GitHub Pages 與 python -m http.server 都不會誤判。
//   3. github.io — 線上前端連 Render
//   4. 其餘 (本機開發:另起靜態伺服器 / 直接開檔) — 連本機後端
const PROD_API = "https://pm-system-api.onrender.com/api";
const API = localStorage.getItem("pm_api") ||
  (window.PM_SERVED_BY_FLASK ? "/api"
   : location.hostname.endsWith("github.io") ? PROD_API
   : "http://127.0.0.1:5000/api");
const S = {
  years: [], year: null, projects: [], view: "table",
  pxPerDay: window.innerWidth < 640 ? 1.4 : 2.4,
  auth: { enabled: false, clientId: "" },
  me: null,   // {user:{...}, teams:[{team_id,role}], editable:"all"|[project_id]}
  teams: [],  // 全部團隊 [{id,name}]
  team: null, // 當前檢視團隊 id;null = 全團隊
  perms: { roles: [], fields: [], matrix: {} },
};
const getTok = () => sessionStorage.getItem("pm_token");
const setTok = (t) => t ? sessionStorage.setItem("pm_token", t)
                        : sessionStorage.removeItem("pm_token");
const STATUS_TXT = { ongoing:"進行中", not_awarded:"未成案", closed:"已結案" };
// 專案調色盤:以 id 對應,顏色跨裝置/重整穩定;已結案一律灰色 (視覺退場)
const PALETTE = ["#0F766E","#2563EB","#B45309","#7C3AED","#C2410C","#0E7490",
                 "#BE185D","#4D7C0F","#B91C1C","#6D28D9","#0369A1","#A16207"];
const projColor = (p) => p.status === "closed"
  ? "var(--gray)" : PALETTE[p.id % PALETTE.length];
// 團隊配色:依 id 穩定分色 (每個團隊固定一色,不同團隊不同色)
const teamColor = (id) => PALETTE[id % PALETTE.length];
// 分包標籤:主包視角顯示「分包TO 團隊」;分包視角顯示「分包FROM 主包團隊」
function subcontractLabels(p) {
  const out = [];
  const chip = (txt, col) => el("span", { class: "sub-label",
    style: `border:1px solid ${col};color:${col};`
      + `background:color-mix(in srgb, ${col} 12%, transparent)` }, txt);
  if (p.is_subcontract_view && p.master_team_id != null) {
    // 分包視角 (f)
    out.push(chip(`分包FROM ${teamName(p.master_team_id)}`, teamColor(p.master_team_id)));
  } else if (Array.isArray(p.subcontract_to) && p.subcontract_to.length) {
    // 主包視角 (c):可能分包給多個團隊,各一個標籤 (用各團隊色)
    for (const tid of p.subcontract_to)
      out.push(chip(`分包TO ${teamName(tid)}`, teamColor(tid)));
  }
  return out;
}
/* ---- 主題 ---- */
function applyTheme(mode) {
  document.documentElement.dataset.theme = mode;
  localStorage.setItem("pm_theme", mode);
}
/* ---- 字級縮放 (全系統) ---- */
const FS_MIN = 0.8, FS_MAX = 1.5, FS_STEP = 0.1;
function applyFontScale(scale) {
  scale = Math.min(FS_MAX, Math.max(FS_MIN, Math.round(scale * 10) / 10));
  document.documentElement.style.setProperty("--fs-scale", String(scale));
  localStorage.setItem("pm_fs", String(scale));
  const dn = $("#fsDown"), up = $("#fsUp");
  if (dn) dn.disabled = scale <= FS_MIN + 1e-9;
  if (up) up.disabled = scale >= FS_MAX - 1e-9;
  // 字級改變會縮放 fixed 元素的座標系,鈴鐺可能被推出畫面 —— 拉回可見範圍。
  // zoom 生效有一拍延遲,用 requestAnimationFrame 等它套用後再量測重定位。
  // rAF 的 callback 在本輪 script 跑完後才觸發,那時 Bell 一定已定義好;
  // try 仍包一層以防萬一 (例如鈴鐺尚未 start)。
  requestAnimationFrame(() => { try { Bell.reposition(); } catch (_e) {} });
  return scale;
}
function currentFontScale() {
  return parseFloat(localStorage.getItem("pm_fs")) || 1;
}
document.addEventListener("DOMContentLoaded", () => {
  $("#themeBtn").addEventListener("click", () =>
    applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));
  applyFontScale(currentFontScale());   // 套用記住的字級
  $("#fsDown").addEventListener("click", () =>
    applyFontScale(currentFontScale() - FS_STEP));
  $("#fsUp").addEventListener("click", () =>
    applyFontScale(currentFontScale() + FS_STEP));
});

/* ============================== 小工具 ============================== */
const $ = (sel) => document.querySelector(sel);
const el = (tag, attrs = {}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for (const kid of kids) n.append(kid);
  return n;
};
const fmtAmt = (n) => (n == null || n === "" ? "—" : Number(n).toLocaleString("zh-TW"));
// 後端 created_at 為伺服器 UTC 時間 (格式 "YYYY-MM-DD HH:MM:SS",無時區標記);
// 依瀏覽器時區轉換顯示。無法解析時原樣回傳。
function fmtLocalTime(s) {
  if (!s) return "";
  // 已含 T/Z 直接解析;否則視為 UTC 補上標記
  const iso = /[TZ]/.test(s) ? s : s.replace(" ", "T") + "Z";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return s;
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} `
       + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
// 二态是/否 toggle button;回传 {el, get, set, onchange, setDisabled}
function makeToggle(on, labels = ["是", "否"], colors = ["var(--teal)", "var(--ink2)"]) {
  let state = !!on, disabled = false, handler = null;
  const btn = el("button", { type: "button", class: "toggle-btn",
    style: "min-width:52px;padding:4px 12px;border-radius:14px;border:none;"
      + "cursor:pointer;font-size:12.5px;font-weight:600;color:#fff;transition:all .15s" });
  const paint = () => {
    btn.textContent = state ? labels[0] : labels[1];
    btn.style.background = state ? colors[0] : colors[1];
    btn.style.opacity = disabled ? "0.45" : "1";
    btn.style.cursor = disabled ? "not-allowed" : "pointer";
  };
  btn.addEventListener("click", () => {
    if (disabled) return;
    state = !state; paint(); if (handler) handler(state);
  });
  paint();
  return { el: btn, get: () => state, set: (v) => { state = !!v; paint(); },
    onchange: (fn) => { handler = fn; },
    setDisabled: (v) => { disabled = !!v; paint(); } };
}
// 多态循环 toggle;options=[{value,label,color}]
function makeCycleToggle(value, options) {
  let idx = Math.max(0, options.findIndex(o => o.value === value));
  let disabled = false, handler = null;
  const btn = el("button", { type: "button", class: "toggle-btn",
    style: "min-width:64px;padding:4px 12px;border-radius:14px;border:none;"
      + "cursor:pointer;font-size:12.5px;font-weight:600;color:#fff;transition:all .15s" });
  const paint = () => {
    const o = options[idx];
    btn.textContent = o.label;
    btn.style.background = o.color;
    btn.style.opacity = disabled ? "0.45" : "1";
    btn.style.cursor = disabled ? "not-allowed" : "pointer";
  };
  btn.addEventListener("click", () => {
    if (disabled) return;
    idx = (idx + 1) % options.length; paint();
    if (handler) handler(options[idx].value);
  });
  paint();
  return { el: btn, get: () => options[idx].value,
    set: (v) => { idx = Math.max(0, options.findIndex(o => o.value === v)); paint(); },
    onchange: (fn) => { handler = fn; },
    setDisabled: (v) => { disabled = !!v; paint(); } };
}
const fmtDur = (days) => {
  if (days == null) return "—";
  const m = days / 30.44;
  if (m < 0.5) return "<1個月";
  return (Math.round(m * 10) / 10).toString().replace(/\.0$/, "") + "個月";
};
const rocDate = (iso) => {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${Number(y) - 1911}/${m}/${d}`;
};
const utc = (iso) => { const [y,m,d] = iso.split("-").map(Number); return Date.UTC(y, m-1, d); };
const DAY = 86400000;
// 保固期 = 履約迄日 ~ 履約迄日 + 保固年數。回傳保固相關資訊 (無保固/無迄日則 null)
function warrantyInfo(p) {
  if (!p.warranty_years || !p.end_date) return null;
  const start = utc(p.end_date);                 // 保固起日 = 履約迄日
  const e = new Date(start);
  e.setUTCFullYear(e.getUTCFullYear() + Number(p.warranty_years));
  const end = e.getTime();                        // 保固迄日
  const today = utc(todayISO());
  return { start, end,
    active: today >= start && today <= end,       // 目前在保固期內
    endISO: `${e.getUTCFullYear()}-${String(e.getUTCMonth()+1).padStart(2,"0")}`
            + `-${String(e.getUTCDate()).padStart(2,"0")}`,
    daysLeft: Math.ceil((end - today) / DAY) };    // 距保固結束天數
}
const todayISO = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
let toastTimer = null;
function toast(msg, isErr = false) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "show" + (isErr ? " err" : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (t.className = ""), 2600);
}

/* ============================== API ============================== */
async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json" };
  const tok = getTok();
  if (tok) headers["Authorization"] = "Bearer " + tok;
  else  // 開發模式:以 X-User 記操作者 (header 僅容許 ISO-8859-1,中文須編碼)
    headers["X-User"] = encodeURIComponent(localStorage.getItem("pm_user") || "訪客");
  const res = await fetch(API + path, { ...opts, headers });
  const nt = res.headers.get("X-New-Token");   // 滑動續期
  if (nt) setTok(nt);
  let body = null;
  try { body = await res.json(); } catch (_e) { /* no body */ }
  if (res.status === 401 && S.auth.enabled) {
    logout((body && body.error) || "請重新登入");
    throw new Error((body && body.error) || "未登入");
  }
  if (!res.ok) throw new Error((body && body.error) || `HTTP ${res.status}`);
  return body;
}

/* ============================== 登入 / 權限 ============================== */
function permLevel(fkey, proj) {
  if (!S.auth.enabled) return "writable";
  if (!S.me) return "invisible";
  // 有專案上下文且帶 per-project 權限:依「該專案所屬團隊」的角色判定
  // (修跨團隊越權的 UI 顯示);proj.my_levels===null 表示不受限 (admin)
  if (proj && "my_levels" in proj) {
    if (proj.my_levels === null) return "writable";
    return proj.my_levels[fkey] || "writable";
  }
  return (S.me.my_levels || {})[fkey] || "writable";
}
const canSee = (f, proj) => permLevel(f, proj) !== "invisible";
const canWrite = (f, proj) => permLevel(f, proj) === "writable";

function teamName(id) {
  const x = S.teams.find(t => t.id === id);
  return x ? x.name : "未指定";
}
function teamOptions() {   // 可切換的團隊清單 (null=全團隊;"none"=未加入團隊)
  if (!S.auth.enabled || isAdmin())
    return [null, ...S.teams.map(t => t.id)];
  const mine = ((S.me && S.me.teams) || []).map(m => m.team_id);
  if (mine.length === 0) return ["none"];        // 未加入團隊:看不到任何專案 (Bug2)
  if (mine.length === 1) return [mine[0]];       // 單一團隊直接鎖定顯示,不循環
  return [null, ...mine];                        // 多團隊:全團隊 + 各團隊循環
}
function viewProjects() {  // 依當前團隊過濾
  if (S.team === "none") return [];              // 未加入團隊 → 無專案
  if (S.team == null) return S.projects;         // 全團隊 → 全部 (含雙棲兩筆)
  return S.projects.filter(p =>
    p.is_subcontract_view
      ? p.viewing_team_id === S.team             // 分包視角那筆 → 歸分包團隊
      : p.team_id === S.team);                    // 主包視角那筆 → 歸主包團隊
}
function renderTeamChip() {
  const c = $("#teamChip");
  const opts = teamOptions();
  if (!opts.includes(S.team)) S.team = opts[0];
  c.style.display = "";
  c.textContent = S.team === "none" ? "未加入團隊"
                : S.team == null ? "全團隊" : teamName(S.team);
  // 切到特定團隊時,chip 反映該團隊顏色;全團隊/未加入用中性色
  if (S.team != null && S.team !== "none") {
    const col = teamColor(S.team);
    c.style.borderColor = col;
    c.style.color = col;
    c.style.background = `color-mix(in srgb, ${col} 12%, transparent)`;
  } else {
    c.style.borderColor = "";
    c.style.color = "";
    c.style.background = "";
  }
  const switchable = opts.length > 1;
  c.title = S.team === "none" ? "你尚未被指派任何團隊,請洽管理者"
          : switchable ? "點擊切換團隊" : "你所屬的團隊";
  c.style.cursor = switchable ? "pointer" : "default";
  c.onclick = switchable ? () => {
    const i = opts.indexOf(S.team);
    S.team = opts[(i + 1) % opts.length];
    renderTeamChip(); render();
  } : null;
}

// editable = 可編輯的「團隊 id」清單;admin = "all"
function projTeam(pid) {
  const p = (S.projects || []).find(x => x.id === pid);
  return p ? p.team_id : null;
}
function canEdit(pid, proj) {
  if (!S.auth.enabled) return true;
  if (!S.me) return false;
  if (S.me.editable === "all") return true;
  // 優先用傳入的視角物件 (雙棲使用者同一 id 有主包/分包兩筆,不可用 id 查找)
  const p = proj || S.projects.find(x => x.id === pid);
  const tid = p ? p.team_id : projTeam(pid);
  // 分包視角:此案分包給我團隊 → 可編輯 (共享欄位由分包硬規則擋成唯讀)
  if (p && p.is_subcontract_view)
    return (S.me.teams || []).some(m => m.team_id === p.viewing_team_id);
  // 主包視角:主包團隊成員可編輯
  return tid != null && S.me.editable.includes(tid);
}
// 是否為該專案的專案經理 (管理者恆真;否則須在該專案團隊中角色為 pm)
function isProjectPM(pid) {
  if (!S.auth.enabled) return true;   // 開發模式全開
  if (!S.me) return false;
  if (S.me.user.role === "admin") return true;
  const tid = projTeam(pid);
  if (tid == null) return false;
  return (S.me.teams || []).some(m => m.team_id === tid && m.role === "pm");
}
function canCreate() {
  if (!S.auth.enabled) return true;
  if (!S.me) return false;
  return S.me.editable === "all" || S.me.editable.length > 0; // 屬於任一團隊即可
}
function isAdmin() {
  return !S.auth.enabled || (S.me && S.me.user.role === "admin");
}
function applyPerms() {
  $("#btnAdd").style.display = canCreate() ? "" : "none";
  // 單機版該分頁只剩團隊管理 (帳號與權限矩陣都不適用) → 標籤據實更名,
  // 否則會出現一個叫「權限設定」卻沒有權限設定的分頁
  $("#vUsers").textContent = S.standalone ? "團隊管理" : "權限設定";
  $("#vUsers").style.display = isAdmin() ? "" : "none";
  const isAnyPM = isAdmin() ||
    ((S.me && S.me.teams) || []).some(m => m.role === "pm");
  // 單機版:不寄信,通知模組整個隱藏 (「使用者管理」不隱藏 —— 團隊管理在那裡面)
  const showNotify = !S.standalone &&
    ((S.auth.enabled && isAnyPM) || !S.auth.enabled);
  $("#vNotify").style.display = showNotify ? "" : "none";
  applyYearControlsVisibility();
}
function logout(msg) {
  setTok(null); S.me = null; clearTimeout(idleT);
  applyPerms(); renderUserChip(); renderLogin(msg);
}
let gisP = null;
function loadGIS() {
  if (window.google && window.google.accounts) return Promise.resolve();
  if (gisP) return gisP;
  gisP = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = res; s.onerror = rej;
    document.head.append(s);
  });
  return gisP;
}
function renderLogin(msg) {
  $("#yearTabs").innerHTML = "";
  const box = el("div", { class: "state-msg" });
  if (msg) box.append(el("div", { style: "color:var(--red);margin-bottom:10px" }, msg));
  box.append(el("div", { style: "font-size:16px;color:var(--navy);font-weight:600" },
                "專案管理系統"),
             el("div", { style: "margin:6px 0 16px;color:var(--ink2)" },
                "請使用 Google 帳號登入"),
             el("div", { id: "gbtn", style: "display:flex;justify-content:center" }));
  $("#content").replaceChildren(box);
  loadGIS().then(() => {
    window.google.accounts.id.initialize({
      client_id: S.auth.clientId, callback: onGoogleCred });
    window.google.accounts.id.renderButton(
      document.getElementById("gbtn"),
      { theme: "outline", size: "large", text: "signin_with", width: 240 });
  }).catch(() =>
    $("#gbtn").append(el("div", {}, "無法載入 Google 登入元件,請檢查網路後重整")));
}
async function onGoogleCred(resp) {
  try {
    const r = await fetch(API + "/auth/google", {
      method: "POST", headers: { "Content-Type": "application/json" },

/* ---------- 欄寬拖拉 (滑鼠/觸控,寬度記憶於瀏覽器) ---------- */
function colResizer(opts) {
  const h = el("div", { class: "col-resizer", title: "拖拉調整欄寬" });
  h.addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startW = opts.get();
    h.classList.add("dragging");
    document.body.style.userSelect = "none";
    try { h.setPointerCapture(e.pointerId); } catch (_e) { /* 舊環境無此 API */ }
    // move/up 掛在 window:游標離開把手、甚至離開視窗都能持續追蹤
    const move = (ev) => {
      const w = Math.min(opts.max, Math.max(opts.min, startW + ev.clientX - startX));
      opts.set(w);
    };
    const up = () => {
      h.classList.remove("dragging");
      document.body.style.userSelect = "";
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      window.removeEventListener("pointercancel", up);
      localStorage.setItem(opts.key, String(Math.round(opts.get())));
      if (opts.onDone) opts.onDone();
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    window.addEventListener("pointercancel", up);
  });
  // 阻止拖完的 click 冒泡誤觸 (如甘特名稱列開編輯視窗)
  h.addEventListener("click", (e) => e.stopPropagation());
  return h;
}
const storedW = (key, def) => Number(localStorage.getItem(key)) || def;

// 分組顯示順序 (可拖拉調整,存 localStorage);回傳 status key 陣列
const GROUP_KEYS = ["ongoing", "not_awarded", "closed", "warranty"];
function groupOrder() {
  try {
    const saved = JSON.parse(localStorage.getItem("pm_group_order") || "null");
    if (Array.isArray(saved)) {
      // 保留有效鍵 + 補上任何新增的鍵 (向後相容)
      const valid = saved.filter(k => GROUP_KEYS.includes(k));
      for (const k of GROUP_KEYS) if (!valid.includes(k)) valid.push(k);
      return valid;
    }
  } catch (_e) { /* fall through */ }
  return [...GROUP_KEYS];
}
function saveGroupOrder(order) {
  localStorage.setItem("pm_group_order", JSON.stringify(order));
}

let _dragGroup = null;   // 目前拖曳中的分組 key
function attachGroupDrag(tr, st) {
  tr.addEventListener("dragstart", (e) => {
    _dragGroup = st;
    tr.classList.add("grp-dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", st); } catch (_e) {}
  });
  tr.addEventListener("dragend", () => {
    _dragGroup = null;
    tr.classList.remove("grp-dragging");
    document.querySelectorAll(".grp-drop-target")
      .forEach(x => x.classList.remove("grp-drop-target"));
  });
  tr.addEventListener("dragover", (e) => {
    if (_dragGroup && _dragGroup !== st) {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      tr.classList.add("grp-drop-target");
    }
  });
  tr.addEventListener("dragleave", () => tr.classList.remove("grp-drop-target"));
  tr.addEventListener("drop", (e) => {
    e.preventDefault();
    tr.classList.remove("grp-drop-target");
    if (!_dragGroup || _dragGroup === st) return;
    const order = groupOrder();
    const from = order.indexOf(_dragGroup);
    if (from < 0) return;
    order.splice(from, 1);                      // 先移除拖曳的分組
    const to = order.indexOf(st);               // 再找目標現在的位置
    order.splice(to < 0 ? order.length : to, 0, _dragGroup);  // 插在目標前面
    saveGroupOrder(order);
    render();                                   // 重繪套用新順序
  });
}

  const LABELS = { ongoing: "進行中", not_awarded: "未成案",

    el("table", {}, thead, tbody, ...(tfoot ? [tfoot] : [])));

    + "這些通知不分角色,可個別啟用或停用。"));

        el("div", { style: "font-size:12px;color:var(--ink2);line-height:1.5" }, t.desc || "")),

  const STLBL = { sent: "已發送", dryrun: "乾跑", failed: "失敗", skipped: "略過" };

    hb.append(el("tr", {},
      el("td", {}, fmtLocalTime(n.created_at)),
      el("td", {}, TYLBL[n.ntype] || n.ntype),
      el("td", { style: "text-align:left" }, n.subject),
      el("td", { style: "text-align:left;font-size:12px" }, n.recipients || "—"),

      el("td", { style: "text-align:left;font-size:12px;color:var(--ink2);"
        + "max-width:280px;white-space:normal" }, n.detail || "—")));
  }
  body.append(el("div", { class: "tbl-wrap" },
    el("table", { style: "min-width:720px" }, hh, hb)));
}

  if (!history.length) {
    wrap.append(el("div", { class: "state-msg" }, "尚無通知紀錄"));
  } else {
    const cols = ["時間","類型","主旨","收件人","狀態","詳情"];
    if (isAdmin()) cols.push("");
    const hh = el("thead", {}, el("tr", {}, ...cols.map(h => el("th", {}, h))));
    const STLBL = { sent: "已發送", dryrun: "乾跑", failed: "失敗", skipped: "略過" };
    const hb = el("tbody");

      hb.append(el("tr", {},
        el("td", {}, fmtLocalTime(n.created_at)),

          if (n.status === "failed") td.style.color = "var(--red)";

        })(),
        el("td", { style: "text-align:left;font-size:12px;color:var(--ink2);"

    wrap.append(el("div", { class: "tbl-wrap" }, el("table", { style: "min-width:720px" }, hh, hb)));
  }
}

// 跨年度:載入所有年度、有保固的專案,分「保固中」「完保」兩清單
async function renderWarranty() {
  const box = $("#content");
  box.innerHTML = `<div class="state-msg">載入保固資料中…</div>`;
  let all;
  try {
    all = await api("/projects");          // 不帶 year → 跨年度全部
  } catch (e) {
    box.innerHTML = `<div class="state-msg">${esc(e.message)}</div>`;
    return;
  }
  // 僅取有保固年數且有履約迄日者;依團隊資料牆過濾 (後端已處理)
  const withWty = all.map(p => ({ p, w: warrantyInfo(p) }))
    .filter(x => x.w);
  const active = withWty.filter(x => x.w.active)
    .sort((a, b) => a.w.daysLeft - b.w.daysLeft);       // 快到期在前
  const expired = withWty.filter(x => !x.w.active && x.w.end < utc(todayISO()))
    .sort((a, b) => b.w.end - a.w.end);                 // 剛完保在前
  // (尚未進入保固期者 (履約中) 不列入此表)

  box.innerHTML = "";
  const wrap = el("div");
  const section = (title, items, cls) => {
    wrap.append(el("div", { class: "wty-sec-h " + cls },
      `${title}(${items.length})`));
    if (!items.length) {
      wrap.append(el("div", { class: "state-msg", style: "padding:14px" },
        cls === "active" ? "目前沒有保固中的專案" : "目前沒有已完保的專案"));
      return;
    }
    const rows = items.map(({ p, w }) => {
      const label = w.active
        ? (w.daysLeft <= 0 ? "已到期" : `剩餘 ${w.daysLeft} 天`)
        : "已完保";
      const urgent = w.active && w.daysLeft <= 90;
      return el("tr", { class: "row", onclick: () => openModal(p) },
        el("td", {}, String(p.year)),
        el("td", { class: "name" }, p.name, ...subcontractLabels(p)),
        el("td", {}, p.contract_no || "—"),
        el("td", { class: "num" }, rocDate(p.end_date)),
        el("td", { class: "num" }, `${p.warranty_years} 年`),
        el("td", { class: "num" }, rocDate(w.endISO)),
        el("td", {}, el("span", { class: "wty",
          style: urgent ? "color:var(--red);border-color:var(--red)" : "" },
          label)));
    });
    const hh = el("thead", {}, el("tr", {},
      ...["年度", "案名", "契約號", "履約迄", "保固", "保固迄", "狀態"]
        .map(h => el("th", {}, h))));
    wrap.append(el("div", { class: "tbl-wrap" },
      el("table", { style: "min-width:760px" }, hh, el("tbody", {}, ...rows))));
  };
  section("保固中", active, "active");
  section("完保", expired, "expired");
  box.append(wrap);
}

/* ============================== 甘特圖 ============================== */
function ganttRange() {
  const dated = S.projects.filter(p => p.start_date && p.end_date);
  const ce = 1911 + S.year;
  let lo = utc(`${ce}-01-01`), hi = utc(`${ce}-12-31`);
  for (const p of dated) {
    lo = Math.min(lo, utc(p.start_date));
    hi = Math.max(hi, utc(p.end_date));
    const w = warrantyInfo(p);           // 保固期延伸到履約迄日之後,納入範圍
    if (w) hi = Math.max(hi, w.end);
  }
  // 對齊月界:起點退到當月1日,終點推到次月1日
  const a = new Date(lo), b = new Date(hi);
  return {
    lo: Date.UTC(a.getUTCFullYear(), a.getUTCMonth(), 1),
    hi: Date.UTC(b.getUTCFullYear(), b.getUTCMonth() + 1, 1),
  };
}

function renderGantt() {
  const vp = viewProjects();
  const dated = vp.filter(p => p.start_date && p.end_date);
  const undated = vp.filter(p => !p.start_date || !p.end_date);
  const { lo, hi } = ganttRange();
  const px = S.pxPerDay;
  const totalDays = Math.round((hi - lo) / DAY);
  const W = Math.ceil(totalDays * px);
  // 橫屏手機等矮視窗:壓縮列高與表頭,一屏塞進更多專案
  const short = window.innerHeight < 520;
  const HEAD = short ? 26 : 34, ROW = short ? 32 : 44;
  const H = HEAD + dated.length * ROW;
  const X = (ms) => Math.round((ms - lo) / DAY * px);

  let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" font-family="inherit">`;

  // 季度底紋 + 月格線 + 月標
  for (let t = lo; t < hi;) {
    const d = new Date(t);
    const y = d.getUTCFullYear(), m = d.getUTCMonth();
    const next = Date.UTC(y, m + 1, 1);
    const q = Math.floor(m / 3);
    if (q % 2 === 1)
      svg += `<rect x="${X(t)}" y="${HEAD}" width="${X(next)-X(t)}" height="${H-HEAD}" fill="var(--ink)" opacity="0.03"/>`;
    svg += `<line x1="${X(t)}" y1="0" x2="${X(t)}" y2="${H}" stroke="var(--line)" stroke-width="1"/>`;
    const label = `${y-1911}/${String(m+1).padStart(2,"0")}`;
    if (X(next) - X(t) > 34)
      svg += `<text x="${X(t)+4}" y="${HEAD-9}" font-size="11" fill="var(--ink2)">${label}</text>`;
    t = next;
  }
  svg += `<line x1="0" y1="${HEAD}" x2="${W}" y2="${HEAD}" stroke="var(--line)"/>`;

  // 橫向列線
  for (let i = 1; i <= dated.length; i++)
    svg += `<line x1="0" y1="${HEAD+i*ROW}" x2="${W}" y2="${HEAD+i*ROW}" stroke="var(--line2)"/>`;

  // 專案長條
  dated.forEach((p, i) => {
    const x = X(utc(p.start_date));
    const w = Math.max(X(utc(p.end_date)) + Math.round(px) - x, 4); // 含迄日整天
    const h = short ? 16 : 22;
    const y = HEAD + i * ROW + Math.round((ROW - h) / 2);
    const fill = projColor(p);
    const dash = p.status === "not_awarded"
      ? ` stroke="${fill}" stroke-width="1.5" stroke-dasharray="5 3"` : "";
    const op = p.status === "not_awarded" ? "0.4" : (p.status === "closed" ? "0.65" : "0.92");
    svg += `<g class="bar" data-id="${p.id}" data-vt="${p.viewing_team_id != null ? p.viewing_team_id : ''}" data-sub="${p.is_subcontract_view ? 1 : 0}" style="cursor:pointer">`;
    svg += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="${fill}" opacity="${op}"${dash}/>`;
    // 保固期:從履約迄日延伸到保固迄日,以「同色實心淺色塊」表示,
    // 像履約條淡出的尾巴 (右側圓角);與未成案的虛線外框明顯區隔
    const wty = warrantyInfo(p);
    if (wty) {
      const wx = X(utc(p.end_date)) + Math.round(px);   // 保固起 = 履約迄日隔天位置
      const wxEnd = X(wty.end) + Math.round(px);
      const ww = Math.max(wxEnd - wx, 3);
      const wtyUrgent = wty.active && wty.daysLeft <= 90;
      const wtyColor = wtyUrgent ? "var(--red)" : fill;
      const title = `<title>保固期 ${rocDate(p.end_date)} ~ ${rocDate(wty.endISO)}`
        + `${wty.active ? (wty.daysLeft <= 0 ? " (已到期)" : ` (剩 ${wty.daysLeft} 天)`) : ""}</title>`;
      // 實心淺色塊 (低透明度),接在履約條尾端,像履約條的延伸尾巴
      svg += `<path d="M ${wx} ${y} H ${wx + ww - 5} `
           + `Q ${wx + ww} ${y} ${wx + ww} ${y + 5} `
           + `V ${y + h - 5} Q ${wx + ww} ${y + h} ${wx + ww - 5} ${y + h} `
           + `H ${wx} Z" fill="${wtyColor}" opacity="0.22">${title}</path>`;
    }
    if (w > 74 && !short)
      svg += `<text x="${x+8}" y="${y+15}" font-size="11" fill="#fff">${fmtDur(p.duration_days)}</text>`;
    if (p.kickoff_date) {
      const kx = X(utc(p.kickoff_date)) + px/2;
      svg += `<path d="M ${kx} ${y-6} l 5 6 l -5 6 l -5 -6 z" fill="var(--navy)"><title>啟動會議 ${rocDate(p.kickoff_date)}</title></path>`;
    }
    // 里程碑:鏤空菱形鑲在長條上 (底=背景色、框=專案色),
    // 標籤「M/D 名稱」直接印在圖上;上下兩條車道交錯防疊字
    const msR = short ? 4.5 : 6;
    const msFont = short ? 9 : 10.5;
    const lanes = { top: [], bottom: [] };   // 各車道已占用的 x 區間
    if (p.kickoff_date) {                    // 啟動會議菱形占用上車道
      const kx0 = X(utc(p.kickoff_date)) + px / 2;
      lanes.top.push([kx0 - 8, kx0 + 8]);
    }
    const estW = (s) => [...s].reduce((w, c) =>
      w + (c.charCodeAt(0) > 255 ? msFont : msFont * 0.56), 0);
    const msList = p.is_subcontract_view
      ? [...(p.master_milestones || []).map(m => ({ ...m, _pfx: "主:" })),
         ...(p.milestones || []).map(m => ({ ...m, _pfx: "分:" }))]
      : (p.milestones || []).map(m => ({ ...m, _pfx: "" }));
    for (const m of msList) {
      const mms = utc(m.date);
      if (mms < lo || mms > hi) continue;
      const mx = X(mms) + px / 2, cy = y + h / 2;
      const mColor = m._pfx === "主:" ? teamColor(p.master_team_id)
                   : m._pfx === "分:" ? teamColor(p.viewing_team_id) : fill;
      svg += `<path d="M ${mx} ${cy - msR} L ${mx + msR} ${cy} L ${mx} ${cy + msR} L ${mx - msR} ${cy} Z"`
           + ` fill="var(--panel)" stroke="${mColor}" stroke-width="2">`
           + `<title>◇ ${esc(m.name)}
${rocDate(m.date)}</title></path>`;
      const [, mo, dd] = m.date.split("-");
      const label = `${Number(mo)}/${Number(dd)} ${m._pfx}${m.name}`;
      const w2 = estW(label) / 2;
      const lx = Math.max(2 + w2, Math.min(W - 2 - w2, mx));   // 邊緣內縮
      const span = [lx - w2 - 5, lx + w2 + 5];
      const fits = (lane) => lane.every(([a, b]) => span[1] < a || span[0] > b);
      let laneY = null;
      if (fits(lanes.top)) { lanes.top.push(span); laneY = y - 3; }
      else if (fits(lanes.bottom)) { lanes.bottom.push(span); laneY = y + h + msFont + 1; }
      if (laneY !== null)
        svg += `<text x="${lx}" y="${laneY}" font-size="${msFont}" font-weight="500"`
             + ` text-anchor="middle" fill="${mColor}">${esc(label)}</text>`;
    }
    svg += `<title>${esc(p.name)}\n${rocDate(p.start_date)} ~ ${rocDate(p.end_date)}(${fmtDur(p.duration_days)})\n${STATUS_TXT[p.status]}${p.awarded_amount!=null ? "\n決標 " + fmtAmt(p.awarded_amount) : ""}</title></g>`;
  });

  // 今天線
  const now = utc(todayISO());
  if (now >= lo && now <= hi) {
    const tx = X(now);
    svg += `<line x1="${tx}" y1="0" x2="${tx}" y2="${H}" stroke="var(--red)" stroke-width="1.5"/>`;
    svg += `<rect x="${tx+3}" y="4" width="34" height="16" rx="3" fill="var(--red)"/>`;
    svg += `<text x="${tx+20}" y="16" font-size="10.5" fill="#fff" text-anchor="middle">今天</text>`;
  }
  svg += `</svg>`;

  // 左側名稱欄
  const names = el("div", { class: "g-names" },
    el("div", { class: "g-head", style: `height:${HEAD}px` }, `${dated.length} 件專案`));
  const setNamesW = (w) => {
    names.style.flex = `0 0 ${w}px`;
    names.style.width = names.style.minWidth = names.style.maxWidth = w + "px";
  };
  setNamesW(storedW("pm_gnw", window.innerWidth < 640 ? 118 : 190));
  names.append(colResizer({
    get: () => parseFloat(names.style.width),
    set: setNamesW,
    key: "pm_gnw", min: 80, max: 420,
    onDone: () => renderGantt() }));
  for (const p of dated) {
    const dot = el("i", { class: "dot" });
    dot.style.background = projColor(p);
    const txt = el("div", { class: "txt" },
      el("div", { class: "nm", title: p.name }, p.name));
    if (!short)
      txt.append(el("div", { class: "sub" },
        `${rocDate(p.start_date)} ~ ${rocDate(p.end_date)}`));
    names.append(el("div", { class: "g-name", style: `height:${ROW}px`,
      onclick: () => openModal(p) }, dot, txt));
  }

  const scroll = el("div", { class: "g-scroll" });
  scroll.innerHTML = svg;
  // 滾輪上下 → 甘特圖左右捲動 (時間軸才是主要瀏覽方向)
  scroll.addEventListener("wheel", (ev) => {
    if (Math.abs(ev.deltaY) > Math.abs(ev.deltaX)) {
      ev.preventDefault();
      scroll.scrollLeft += ev.deltaY;
    }
  }, { passive: false });
  scroll.addEventListener("click", (ev) => {
    const g = ev.target.closest("g.bar");
    if (!g) return;
    const gid = Number(g.dataset.id), gsub = g.dataset.sub === "1";
    const gvt = g.dataset.vt === "" ? null : Number(g.dataset.vt);
    const p = viewProjects().find(x => x.id === gid
      && !!x.is_subcontract_view === gsub
      && (x.viewing_team_id != null ? x.viewing_team_id : null) === gvt);
    if (p) openModal(p);
  });

  const ctl = el("div", { class: "gantt-bar-ctl" },
    el("button", { class: "btn", onclick: () => zoom(-0.5) }, "－"),
    el("button", { class: "btn", onclick: () => zoom(+0.5) }, "＋"),
    el("span", { class: "legend" },
      el("span", {}, "顏色=各專案"),
      legendItem(null, "實心=進行中", "solid"),
      legendItem(null, "虛線=未成案", "dash"),
      legendItem("var(--gray)", "灰=已結案", "solid"),
      el("span", {}, "◆ 啟動會議"),
      el("span", {}, "◇ 里程碑")),
    undated.length ? el("span", { class: "legend" },
      `另有 ${undated.length} 件未填起迄日期,僅顯示於總表`) : "");

  const wrap = el("div", {}, ctl, el("div", { class: "gantt" }, names, scroll));
  $("#content").replaceChildren(wrap);

  // 自動捲到今天附近
  if (now >= lo && now <= hi)
    scroll.scrollLeft = Math.max(0, X(now) - scroll.clientWidth * 0.35);

  // 案名斷成兩行的列:隱藏日期副行讓出高度 (單行高約 16px,>22 即為斷行)
  requestAnimationFrame(() => {
    for (const r of names.querySelectorAll(".g-name")) {
      const nm = r.querySelector(".nm"), sub = r.querySelector(".sub");
      if (nm && sub && nm.scrollHeight > 22) sub.style.display = "none";
    }
  });
}
function legendItem(color, txt, kind) {
  const s = el("span", {}, el("i", {}), txt);
  const i = s.querySelector("i");
  if (kind === "dash") {
    i.style.background = "transparent";
    i.style.border = "1.5px dashed var(--ink2)";
  } else i.style.background = color || "var(--teal)";
  return s;
}
function zoom(dv) {
  S.pxPerDay = Math.min(6, Math.max(0.8, S.pxPerDay + dv));
  renderGantt();
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

/* ============================== 使用者管理 (admin) ============================== */
const ROLE_TXT = { admin:"管理者", pm:"專案經理", dept_head:"部門主管",
                   sales:"業務人員", dev:"開發人員" };
async function renderUsers() {
  let users, perms;
  try {
    if (S.standalone) {
      // 單機版沒有登入,也沒有權限控管 → 只需要團隊資料,不打 /users 與 /perms
      S.teams = await api("/teams");
      users = [];
    } else {
      [users, S.teams, perms] = await Promise.all(
        [api("/users"), api("/teams"), api("/perms")]);
      S.perms = perms;
    }
  } catch (e) { $("#content").innerHTML =
    `<div class="state-msg">${esc(e.message)}</div>`; return; }
  const wrap = el("div", { style: "padding:12px" });

  /* ---- 團隊管理列 ---- */
  const teamBar = el("div", { style: "display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px" },
    el("span", { style: "color:var(--ink2);font-size:13px" }, "團隊:"));
  for (const tm of S.teams) {
    const col = teamColor(tm.id);
    teamBar.append(el("span", { class: "badge",
      style: `font-size:13px;padding:3px 10px;border:1.5px solid ${col};`
        + `color:${col};background:color-mix(in srgb, ${col} 12%, transparent)` },
      tm.name,
      el("button", { style: "border:0;background:none;color:var(--ink2);margin-left:5px;cursor:pointer",
        title: "變更團隊名稱 (所有專案/成員/分包關聯不受影響)", onclick: async () => {
          const nn = prompt(`變更團隊名稱:「${tm.name}」改為`, tm.name);
          if (nn == null) return;                    // 取消
          const name = nn.trim();
          if (!name || name === tm.name) return;
          try { await api(`/teams/${tm.id}`, { method: "PUT",
              body: JSON.stringify({ name }) });
            toast(`已更名為「${name}」`); await loadMeta(); renderUsers(); }
          catch (e) { toast(e.message, true); }
        }}, "✎"),
      el("button", { style: "border:0;background:none;color:var(--red);margin-left:2px;cursor:pointer",
        title: "刪除團隊", onclick: async () => {
          if (!confirm(`刪除團隊「${tm.name}」?(仍有專案或成員歸屬時會被擋下)`)) return;
          try { await api(`/teams/${tm.id}`, { method: "DELETE" });
            toast("已刪除團隊"); renderUsers(); }
          catch (e) { toast(e.message, true); }
        }}, "✕")));
  }
  const newTeam = el("input", { placeholder: "新團隊名稱",
    style: "border:1px solid var(--line);border-radius:6px;padding:4px 8px;background:var(--panel);color:var(--ink)" });
  teamBar.append(newTeam, el("button", { class: "btn", onclick: async () => {
    if (!newTeam.value.trim()) return;
    try { await api("/teams", { method: "POST",
        body: JSON.stringify({ name: newTeam.value.trim() }) });
      toast("已建立團隊"); renderUsers(); }
    catch (e) { toast(e.message, true); }
  }}, "＋ 新增團隊"));
  wrap.append(teamBar);

  // 單機版到此為止:沒有登入 → 沒有帳號可管;權限裝飾器在 auth 關閉時是 no-op
  // → 權限矩陣就算改了也不會生效。兩塊都是「看起來能用、其實沒作用」的死 UI,
  // 索性不產生。團隊管理保留 —— 專案要掛團隊,跨團隊分包也要用。
  if (S.standalone) { $("#content").replaceChildren(wrap); return; }

  /* ---- 使用者列表 (含團隊歸屬 B.a) ---- */
  const thead = el("thead", {}, el("tr", {},
    ...["認證Gmail","認證姓名","管理者","狀態","公司信箱","姓名","團隊歸屬(勾選)與團隊角色","",""]
      .map(h => el("th", {}, h))));
  const tbody = el("tbody");
  const myId = S.me ? S.me.user.id : -1;
  for (const u of users) {
    const adminTog = makeToggle(u.role === "admin", ["是", "否"]);
    const stTog = makeCycleToggle(u.status, [
      { value: "pending",  label: "待啟用", color: "var(--amber)" },
      { value: "active",   label: "啟用",   color: "var(--teal)" },
      { value: "disabled", label: "停用",   color: "var(--ink2)" }]);
    // 團隊歸屬:每團隊一個勾選 + 團隊角色下拉
    const memberOf = new Map((u.teams || []).map(m => [m.team_id, m.role]));
    const teamCell = el("td", { style: "text-align:left" });
    const teamRows = [];
    // 團隊區鎖定條件:非啟用、或勾了管理者 (A.d 管理者不須團隊歸屬)
    const teamLockReason = () =>
      u.id === myId ? null
      : stTog.get() !== "active" ? "待啟用/停用者不歸屬團隊"
      : adminTog.get() ? "管理者不須指定團隊 (全系統權限)"
      : null;
    const teamHint = el("div", { style: "font-size:11.5px;color:var(--ink2)" });
    for (const tm of S.teams) {
      const cb = el("input", { type: "checkbox" });
      cb.checked = memberOf.has(tm.id);
      const rs = el("select", {},
        ...["pm","dept_head","sales","dev"].map(v =>
          el("option", { value: v }, ROLE_TXT[v])));
      rs.value = memberOf.get(tm.id) || "dev";
      cb.addEventListener("change", () =>
        rs.style.display = (cb.checked && !cb.disabled) ? "" : "none");
      teamRows.push({ team_id: tm.id, cb, rs, wasMember: memberOf.has(tm.id) });
      teamCell.append(el("label",
        { style: "display:flex;gap:4px;align-items:center;font-size:12.5px;margin:2px 0" },
        cb, tm.name, rs));
    }
    if (!S.teams.length) teamCell.append("(尚無團隊)");
    teamCell.append(teamHint);
    const applyTeamLock = () => {
      const reason = teamLockReason();
      const locked = reason !== null;
      for (const r of teamRows) {
        r.cb.disabled = r.rs.disabled = locked;
        if (locked) r.cb.checked = false;
        else r.cb.checked = r.wasMember;
        r.rs.style.display = (r.cb.checked && !locked) ? "" : "none";
      }
      teamHint.textContent = reason || "";
    };
    adminTog.onchange(applyTeamLock);
    stTog.onchange(applyTeamLock);
    applyTeamLock();
    const notifyIn = el("input", { type: "email", value: u.notify_email || "",
      placeholder: "公司信箱", style: "width:220px;border:1px solid var(--line);"
        + "border-radius:6px;padding:4px 8px;background:var(--panel);color:var(--ink)" });
    const cnameIn = el("input", { type: "text", value: u.company_name || "",
      placeholder: "姓名", style: "width:90px;border:1px solid var(--line);"
        + "border-radius:6px;padding:4px 8px;background:var(--panel);color:var(--ink)" });
    const self = u.id === myId;
    if (self) { adminTog.setDisabled(true); stTog.setDisabled(true); }
    const saveBtn = el("button", { class: "btn", onclick: async () => {
      try {
        const teamsPayload = teamRows.filter(r => r.cb.checked && !r.cb.disabled)
          .map(r => ({ team_id: r.team_id, role: r.rs.value }));
        const payload = self
          ? { notify_email: notifyIn.value.trim(),
              company_name: cnameIn.value.trim(), teams: teamsPayload }
          : { role: adminTog.get() ? "admin" : "dev", status: stTog.get(),
              notify_email: notifyIn.value.trim(),
              company_name: cnameIn.value.trim(), teams: teamsPayload };
        await api(`/users/${u.id}`, { method: "PUT", body: JSON.stringify(payload) });
        toast("已更新 " + u.email); renderUsers();
      } catch (e) { toast(e.message, true); }
    }}, "儲存");
    const delBtn = el("button", { class: "btn danger", onclick: async () => {
      if (!confirm(`刪除使用者 ${u.email}?其團隊歸屬與編輯授權一併移除`)) return;
      try { await api(`/users/${u.id}`, { method: "DELETE" });
        toast("已刪除"); renderUsers(); }
      catch (e) { toast(e.message, true); }
    }}, "刪除");
    if (self) { delBtn.disabled = true; }  // 可存自己的联络资讯,但不可删自己
    const tr = el("tr", {},
      el("td", {}, u.email + (self ? "(你)" : "")),
      el("td", {}, u.name || "—"),
      el("td", {}, adminTog.el), el("td", {}, stTog.el),
      el("td", {}, notifyIn), el("td", {}, cnameIn),
      teamCell, el("td", {}, saveBtn), el("td", {}, delBtn));
    if (u.status === "pending") tr.style.background = "var(--amber-bg)";
    tbody.append(tr);
  }
  wrap.append(el("div", { class: "tbl-wrap" },
    el("table", { style: "min-width:920px" }, thead, tbody)));

  /* ---- 欄位權限矩陣 (B.a 下半) ---- */
  wrap.append(el("div", { style: "margin:18px 0 6px;font-weight:600;color:var(--navy)" },
    "欄位權限矩陣(管理者不受限;未設定 = 可編輯)"));
  const mh = el("thead", {}, el("tr", {}, el("th", {}, "欄位"),
    ...S.perms.roles.map(r => el("th", {}, ROLE_TXT[r] || r))));
  const mb = el("tbody");
  const sels = [];   // {role, field, sel}
  for (const fdef of S.perms.fields) {
    const tr = el("tr", {}, el("td", { style: "text-align:left" }, fdef.label));
    for (const role of S.perms.roles) {
      const opts = [el("option", { value: "writable" }, "可編輯"),
                    el("option", { value: "readonly" }, "唯讀")];
      if (fdef.key !== "status")   // 狀態是總表分組骨架,不可隱藏
        opts.push(el("option", { value: "invisible" }, "不可見"));
      const sel = el("select", {}, ...opts);
      sel.value = (S.perms.matrix[role] || {})[fdef.key] || "writable";
      sels.push({ role, field: fdef.key, sel });
      tr.append(el("td", {}, sel));
    }
    mb.append(tr);
  }
  wrap.append(el("div", { class: "tbl-wrap" },
    el("table", { style: "min-width:620px" }, mh, mb)));
  wrap.append(el("div", { style: "margin-top:10px" },
    el("button", { class: "btn primary", onclick: async () => {
      const matrix = {};
      for (const { role, field, sel } of sels) {
        if (sel.value === "writable") continue;
        (matrix[role] = matrix[role] || {})[field] = sel.value;
      }
      try { S.perms = await api("/perms", { method: "PUT",
          body: JSON.stringify({ matrix }) });
        S.perms = await api("/perms");
        toast("已儲存欄位權限矩陣"); }
      catch (e) { toast(e.message, true); }
    }}, "儲存矩陣")));

  $("#content").replaceChildren(wrap);
}

/* ============================== 編輯視窗 ============================== */
function openModal(p) {
  const isNew = !p;
  const d = p || { year: S.year, status: "ongoing", budgets: [{ year: S.year, amount: "" }] };
  const budBox = el("div");
  const addBudRow = (b = { year: "", amount: "" }) => {
    const row = el("div", { class: "bud-row" },
      el("input", { class: "y", type: "number", placeholder: "年度", value: b.year }),
      el("input", { class: "a", type: "number", placeholder: "預估認列金額", value: b.amount ?? "" }),
      el("button", { type: "button", title: "移除",
        onclick: (ev) => ev.target.closest(".bud-row").remove() }, "✕"));
    budBox.append(row);
  };
  (d.budgets || []).forEach(addBudRow);

  const msBox = el("div");
  const addMsRow = (m = { date: "", name: "" }) => {
    const row = el("div", { class: "bud-row ms-row" },
      el("input", { class: "y", type: "date", value: m.date, style: "width:150px" }),
      el("input", { class: "a", placeholder: "里程碑名稱 (如 PDR、SAT驗收)", value: m.name }),
      el("button", { type: "button", title: "移除",
        onclick: (ev) => ev.target.closest(".bud-row").remove() }, "✕"));
    msBox.append(row);
  };
  (d.milestones || []).forEach(addMsRow);

  // 參與成員:從專案團隊勾選 (含備註) + 其他參與者自由文字
  const memBox = el("div", { style: "display:flex;flex-direction:column;gap:4px" });
  const memRows = [];   // { user_id, cb, noteIn }
  let memReadonly = false;   // participants 權限為唯讀時,鎖定勾選與備註
  const memHint = el("div", { style: "font-size:12px;color:var(--ink2)" }, "載入團隊成員中…");
  memBox.append(memHint);
  const alreadyMembers = new Map((d.members || []).map(m => [m.user_id, m.note || ""]));
  const loadTeamMembers = async () => {
    // 分包視角 (d.1):候選人為分包團隊自己的成員;否則以表單選的團隊為準
    const tid = d.is_subcontract_view ? d.viewing_team_id
              : (f.team_id ? (f.team_id.value ? Number(f.team_id.value) : null)
                           : d.team_id);
    memRows.length = 0;
    memBox.replaceChildren(memHint);
    if (!tid) {
      memHint.textContent = "此專案尚未指定團隊,無法勾選成員(可用下方欄位手動填寫)。";
      return;
    }
    memHint.textContent = "載入團隊成員中…";
    let list;
    try { list = await api(`/teams/${tid}/members`); }
    catch (_e) { memHint.textContent = "無法載入團隊成員。"; return; }
    memBox.replaceChildren();
    if (!list.length) {
      memBox.append(el("div", { style: "font-size:12px;color:var(--ink2)" },
        "此團隊尚無成員。"));
      return;
    }
    for (const m of list) {
      const cb = el("input", { type: "checkbox" });
      cb.checked = alreadyMembers.has(m.user_id);
      const noteIn = el("input", { placeholder: "備註 (如:承辦)",
        value: alreadyMembers.get(m.user_id) || "",
        style: "flex:1;border:1px solid var(--line);border-radius:6px;"
          + "padding:3px 8px;background:var(--panel);color:var(--ink);font-size:13px;"
          + (cb.checked ? "" : "display:none") });
      cb.addEventListener("change", () =>
        noteIn.style.display = cb.checked ? "" : "none");
      if (memReadonly) { cb.disabled = true; noteIn.disabled = true; }
      memRows.push({ user_id: m.user_id, cb, noteIn });
      memBox.append(el("div", { style: "display:flex;align-items:center;gap:8px" },
        el("label", { style: "display:flex;align-items:center;gap:5px;min-width:150px;"
          + "font-size:13px" }, cb,
          el("span", {}, m.name),
          el("span", { style: "color:var(--ink2);font-size:11.5px" }, `(${m.role})`)),
        noteIn));
    }
  };

  const f = {};
  // 分組區塊 helper:標題 + 色點 + 內部 2 欄 grid
  const section = (title, color, ...kids) =>
    el("div", { class: "fsec" },
      el("div", { class: "fsec-h" },
        el("span", { class: "dot", style: `background:${color}` }),
        el("span", {}, title)),
      el("div", { class: "fsec-grid" }, ...kids));
  // 掃描檔核選:做成有標籤的橫向勾選 (一眼看懂是「已完成掃描歸檔」)
  const scanChk = (label, checked) => {
    const c = el("input", { type: "checkbox" }); c.checked = !!checked;
    return { input: c, el: el("label", { class: "chk-row full" }, c,
      el("span", {}, label)) };
  };

  // 各欄位元件
  f.name = el("input", { value: d.name || "" });
  f.year = (() => { const i = el("input", { type: "number", value: d.year });
    if (!isNew) i.disabled = true; return i; })();
  f.status = (() => {
    const s = el("select", {},
      el("option", { value: "ongoing" }, "進行中"),
      el("option", { value: "not_awarded" }, "未成案"),
      el("option", { value: "closed" }, "已結案"));
    s.value = d.status; return s; })();
  f.team_id = (() => {
    const s = el("select", {}, el("option", { value: "" }, "未指定"),
      ...S.teams.map(tm => el("option", { value: String(tm.id) }, tm.name)));
    s.value = d.team_id != null ? String(d.team_id) : ""; return s; })();
  f.contract_no = el("input", { value: d.contract_no || "" });
  f.part_no = el("input", { value: d.part_no || "" });
  f.so_number = el("input", { value: d.so_number || "" });
  f.awarded_amount = el("input", { type: "number", value: d.awarded_amount ?? "" });
  const contractScan = scanChk("合約已掃描歸檔", d.contract_scan);
  f.contract_scan = contractScan.input;
  f.start_date = el("input", { type: "date", value: d.start_date || "" });
  f.end_date = el("input", { type: "date", value: d.end_date || "" });
  f.kickoff_date = el("input", { type: "date", value: d.kickoff_date || "" });
  f.warranty_years = el("input", { type: "number", min: "0", max: "50",
    value: d.warranty_years ?? "" });
  f.nda_date = el("input", { type: "date", value: d.nda_date || "" });
  const ndaScan = scanChk("保密文件已掃描歸檔", d.nda_scan);
  f.nda_scan = ndaScan.input;
  f.notify_days_before = el("input", { type: "number", min: "0", max: "365",
    placeholder: "留空=不提醒", value: d.notify_days_before ?? "" });
  f.participants = el("input", { value: d.participants || "",
    placeholder: "如:外部廠商、支援人力" });
  f.notes = el("textarea", {}, d.notes || "");

  const frm = el("div", { class: "frm fsecs" });
  frm.append(
    // 基本資料
    section("基本資料", "var(--navy)",
      el("label", { class: "full" }, "案名 *", f.name),
      el("label", {}, "年度(民國)", f.year),
      el("label", {}, "狀態", f.status),
      el("label", { class: "full" }, "團隊(決定編輯權與參與成員候選)", f.team_id)),
    // 契約資訊
    section("契約資訊", "#c9822e",
      el("label", {}, "契約號", f.contract_no),
      el("label", {}, "料號", f.part_no),
      el("label", {}, "SO number", f.so_number),
      el("label", {}, "決標金額", f.awarded_amount),
      contractScan.el),
    // 期程
    section("期程", "#2e8bc0",
      el("label", {}, "履約起", f.start_date),
      el("label", {}, "履約迄", f.end_date),
      el("label", {}, "啟動會議", f.kickoff_date),
      el("label", {}, "保固(年)", f.warranty_years)),
    // 保密文件 (簽署日 + 掃描檔綁在一起)
    section("保密文件(NDA)", "#8e5bc0",
      el("label", {}, "簽署日期", f.nda_date),
      ndaScan.el),
    // 通知
    section("通知設定", "#3aa76d",
      el("label", { class: "full" }, "里程碑到期前幾天提醒(留空=不提醒)",
        f.notify_days_before)),
    // 參與人員
    section("參與人員", "#c0507a",
      el("label", { class: "full" }, "參與成員(勾選團隊成員,可加備註)", memBox),
      el("label", { class: "full" }, "其他參與者(未註冊系統者,逗號分隔)",
        f.participants)),
    // 預算與里程碑
    section("預算與里程碑", "#4a6fa5",
      el("label", { class: "full" }, "各年度預估認列", budBox,
        el("button", { class: "btn", type: "button", onclick: () => addBudRow() }, "＋ 加一個年度")),
      el("label", { class: "full" }, "里程碑(顯示於甘特圖)", msBox,
        el("button", { class: "btn", type: "button", onclick: () => addMsRow() }, "＋ 加一個里程碑"))),
    // 備註
    section("備註", "var(--ink2)",
      el("label", { class: "full" }, "其他說明", f.notes)),
  );

  // 分包設定 (c/b):主包 pm 或管理者、且非新建、非分包視角 時可設定分包團隊
  const canManageSub = !isNew && !d.is_subcontract_view && isProjectPM(d.id);
  if (canManageSub) {
    const subBox = el("div", { class: "fsec-grid" });
    const subSection = el("div", { class: "fsec" },
      el("div", { class: "fsec-h" },
        el("span", { class: "dot", style: "background:#c0507a" }),
        el("span", {}, "跨團隊分包")),
      el("div", { style: "font-size:12px;color:var(--ink2);margin-bottom:8px" },
        "勾選要分包的團隊 (共享欄位唯讀同步;參與人員、決標、認列、備註、里程碑各團隊獨立)。"),
      subBox);
    const subCbs = [];
    const activeSubs = new Set(d.subcontract_to || []);
    for (const tm of S.teams) {
      if (tm.id === d.team_id) continue;   // 主包不能分包給自己
      const cb = el("input", { type: "checkbox" });
      cb.checked = activeSubs.has(tm.id);
      subCbs.push({ team_id: tm.id, cb });
      const col = teamColor(tm.id);
      subBox.append(el("label", { class: "chk-row",
        style: `border-color:${col}` }, cb,
        el("span", { style: `color:${col};font-weight:600` }, tm.name)));
    }
    if (!subCbs.length)
      subBox.append(el("div", { style: "font-size:12px;color:var(--ink2)" },
        "尚無其他團隊可分包。"));
    const subSaveBtn = el("button", { class: "btn", type: "button",
      style: "margin-top:8px", onclick: async () => {
        const ids = subCbs.filter(x => x.cb.checked).map(x => x.team_id);
        try {
          await api(`/projects/${d.id}/subcontracts`, { method: "PUT",
            body: JSON.stringify({ team_ids: ids }) });
          toast("已更新分包設定"); close(); render();
        } catch (e) { toast(e.message, true); }
      } }, "儲存分包設定");
    subSection.append(subSaveBtn);
    frm.append(subSection);
  }

  const actions = el("div", { class: "modal-actions" });
  // 規則1:刪除鈕僅專案經理 (該專案團隊的 pm) 或管理者可見
  if (!isNew && isProjectPM(d.id))
    actions.append(el("button", { class: "btn danger", onclick: async () => {
      if (!confirm(`確定刪除「${d.name}」?(可由異動紀錄追溯)`)) return;
      try { await api(`/projects/${d.id}`, { method: "DELETE" });
        toast("已刪除"); close(); await refresh(); }
      catch (e) { toast(e.message, true); }
    }}, "刪除"));
  const saveBtn = el("button", { class: "btn primary", onclick: save },
    isNew ? "建立專案" : "儲存變更");
  actions.append(
    el("button", { class: "btn", onclick: () => close() }, "取消"),
    saveBtn);

  // 欄位權限:控制項 -> 矩陣鍵
  const FKEY = { status: "status", name: "name", contract_no: "contract_no", part_no: "part_no",
    so_number: "so_number", start_date: "schedule", end_date: "schedule",
    kickoff_date: "schedule", notify_days_before: "schedule",
    participants: "participants",
    awarded_amount: "awarded_amount", warranty_years: "warranty",
    team_id: "team", contract_scan: "contract", nda_date: "nda",
    nda_scan: "nda", notes: "notes" };
  for (const [k, input] of Object.entries(f)) {
    const fk = FKEY[k];
    if (!fk) continue;
    if (!canSee(fk, d)) input.closest("label").style.display = "none";
    else if (!canWrite(fk, d)) input.disabled = true;
  }
  // 分包視角 (e):共享欄位一律唯讀 (硬規則,凌駕矩陣);獨立欄位照常
  if (d.is_subcontract_view) {
    const SHARED = new Set(["name", "year", "status", "contract_no", "part_no",
      "so_number", "start_date", "end_date", "kickoff_date", "warranty_years",
      "team_id", "contract_scan", "nda_date", "nda_scan"]);
    // awarded_amount (決標金額)、participants、notify_days_before、備註、里程碑、
    // 認列、成員:分包各自獨立可編輯 (決標寫入該團隊 override)
    // participants (其他參與者)、notify_days_before、備註、里程碑:分包各自獨立可編輯
    for (const [k, input] of Object.entries(f))
      if (SHARED.has(k)) input.disabled = true;
  }
  if (!canSee("budgets", d)) budBox.closest ? null : null;
  const budLabel = budBox.parentElement;   // label.full
  if (budLabel) {
    if (!canSee("budgets", d)) budLabel.style.display = "none";
    else if (!canWrite("budgets", d))
      budLabel.querySelectorAll("input,button").forEach(x => x.disabled = true);
  }
  const msLabel = msBox.parentElement;
  if (msLabel) {
    if (!canSee("schedule", d)) msLabel.style.display = "none";
    else if (!canWrite("schedule", d))
      msLabel.querySelectorAll("input,button").forEach(x => x.disabled = true);
  }
  // 參與成員勾選區 (memBox):與「其他參與者」同屬 participants 權限群
  const memLabel = memBox.parentElement;   // label.full
  if (memLabel) {
    if (!canSee("participants", d)) memLabel.style.display = "none";
    else if (!canWrite("participants", d)) {
      memReadonly = true;   // loadTeamMembers 動態渲染時據此鎖定
      // 若成員清單已載入,直接鎖定現有的勾選與備註
      memRows.forEach(r => { r.cb.disabled = true; r.noteIn.disabled = true; });
    }
  }
  const editable = isNew ? canCreate() : canEdit(d.id, d);
  // 若某分組區塊內所有欄位都因權限不可見,則隱藏整個區塊 (避免空卡片)
  frm.querySelectorAll(".fsec").forEach(sec => {
    const labels = [...sec.querySelectorAll("label")];
    if (labels.length && labels.every(l => l.style.display === "none"))
      sec.style.display = "none";
  });
  if (!editable) {
    frm.querySelectorAll("input,select,textarea,button").forEach(x => x.disabled = true);
    actions.querySelectorAll(".primary,.danger").forEach(b => b.remove());
    actions.prepend(el("span", { style: "margin-right:auto;color:var(--ink2);font-size:12.5px" },
      "唯讀(無編輯權限,可向管理者申請)"));
  } else if (!isNew) {
    // 規則2~4:儲存鈕三態 (新增專案不套用,永遠可按)
    const writables = frm.querySelectorAll(
      "input:not([disabled]),select:not([disabled]),textarea:not([disabled])");
    if (!writables.length) {
      // 規則2:沒有任何可編輯欄位 → 隱藏儲存鈕
      saveBtn.style.display = "none";
      actions.prepend(el("span", { style: "margin-right:auto;color:var(--ink2);font-size:12.5px" },
        "此專案對你而言所有欄位皆唯讀"));
    } else {
      // 規則3:有可編輯欄位但未異動 → 凍結;規則4:有異動 → 啟用
      // 用整個表單的事件委派偵測變更,涵蓋里程碑/預算等「動態新增」的子欄位
      // (舊版只綁初始 writables,漏掉 addMsRow 後才出現的里程碑欄位 → 改里程碑
      //  時間按鈕不解凍,即 Bug1 的成因)
      const fieldSig = () => {
        const parts = [];
        frm.querySelectorAll("input,select,textarea").forEach(x => {
          if (x.disabled) return;
          parts.push(x.type === "checkbox" ? (x.checked ? "1" : "0") : x.value);
        });
        return parts.join("|~|");
      };
      let initial = fieldSig();
      const refreshDirty = () => {
        const dirty = fieldSig() !== initial;
        saveBtn.disabled = !dirty;
        saveBtn.title = dirty ? "" : "尚未有任何變更";
      };
      // 事件委派:表單內任何 input/change 都重新判斷 (含未來動態新增的列)
      frm.addEventListener("input", refreshDirty);
      frm.addEventListener("change", refreshDirty);
      // 里程碑/預算「加一列、刪一列」也算異動;新增列後基準需納入新欄位,
      // 故延遲重算 (等 DOM 更新) 並以「與開啟時相比是否有變」為準
      for (const box of [budBox, msBox]) {
        box.addEventListener("click", () => setTimeout(refreshDirty, 0));
      }
      const addBtns = frm.querySelectorAll("button[type=button]");
      addBtns.forEach(b => b.addEventListener("click",
        () => setTimeout(refreshDirty, 0)));
      refreshDirty();   // 初始:凍結
    }
  }
  const modal = el("div", { class: "modal" },
    el("h2", {}, isNew ? `新增專案(${S.year} 年度)` : (editable ? "編輯專案" : "檢視專案")),
    frm);
  if (!isNew && S.auth.enabled && isAdmin()) { /* 逐案編輯授權已由權限矩陣取代,移除 */ }
  modal.append(actions);
  let downOnOverlay = false;
  const overlay = el("div", { class: "overlay",
    onpointerdown: (ev) => { downOnOverlay = (ev.target === overlay); },
    onpointerup: (ev) => {
      // 僅在「空白處按下且在空白處放開」才關閉;欄位內拖曳到外面不誤關
      if (downOnOverlay && ev.target === overlay) close();
      downOnOverlay = false;
    } }, modal);
  document.body.append(overlay);
  const close = () => overlay.remove();
  if (editable) f.name.focus();
  loadTeamMembers();   // 异步载入团队成员勾选清单
  if (f.team_id) f.team_id.addEventListener("change", loadTeamMembers);

  async function save() {
    const inputYear = parseInt(f.year.value, 10);
    if (!inputYear || inputYear < 90 || inputYear > 200)
      return toast("年度格式不正確 (民國,例 114)", true);
    const payload = {
      // 明確告訴後端「正在編輯哪個團隊視角的資料」。分包視角送分包團隊 id,
      // 否則送表單選定的主包團隊。少了這個,管理者/雙棲使用者編輯分包那筆會
      // 被後端誤判為主包視角,把主包資料整批蓋掉 (嚴重資料 bug)。
      as_team: d.is_subcontract_view ? d.viewing_team_id
             : (f.team_id && f.team_id.value ? Number(f.team_id.value) : d.team_id),
      year: isNew ? inputYear : d.year,
      name: f.name.value.trim(), status: f.status.value,
      contract_no: f.contract_no.value.trim(), part_no: f.part_no.value.trim(),
      so_number: f.so_number.value.trim(),
      start_date: f.start_date.value || null, end_date: f.end_date.value || null,
      kickoff_date: f.kickoff_date.value || null,
      awarded_amount: f.awarded_amount.value === "" ? null : Number(f.awarded_amount.value),
      warranty_years: f.warranty_years.value === "" ? null : Number(f.warranty_years.value),
      notify_days_before: f.notify_days_before.value === "" ? null : Number(f.notify_days_before.value),
      team_id: f.team_id.value === "" ? null : Number(f.team_id.value),
      contract_scan: f.contract_scan.checked ? 1 : 0,
      nda_date: f.nda_date.value || null,
      nda_scan: f.nda_scan.checked ? 1 : 0,
      participants: f.participants.value.trim(), notes: f.notes.value.trim(),
      budgets: [...budBox.querySelectorAll(".bud-row")].map(r => ({
        year: Number(r.querySelector(".y").value),
        amount: Number(r.querySelector(".a").value) || 0,
      })).filter(b => b.year),
      milestones: [...msBox.querySelectorAll(".ms-row")].map(r => ({
        date: r.querySelector(".y").value,
        name: r.querySelector(".a").value.trim(),
      })).filter(m => m.date || m.name),
      members: memRows.filter(r => r.cb.checked).map(r => ({
        user_id: r.user_id, note: r.noteIn.value.trim(),
      })),
    };
    if (!payload.name) return toast("案名為必填", true);
    try {
      if (isNew) await api("/projects", { method: "POST", body: JSON.stringify(payload) });
      else await api(`/projects/${d.id}`, { method: "PUT", body: JSON.stringify(payload) });
      toast(isNew ? "已建立" : "已儲存");
      close();
      if (isNew) S.year = payload.year;   // 跳到剛建立的年度 (含補建的過去年度)
      await refresh();
    } catch (e) { toast(e.message, true); }
  }
}
